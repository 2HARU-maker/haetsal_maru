<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>광양햇살학교 전공과 직무훈련실습장</title>
  <style>

/* =========================================================
   메인 화면
   ========================================================= */
html, body{
  margin:0;
  padding:0;
  min-height:100%;
}
body{
  font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
  color:#333333;
}
#main-screen{
  min-height:100vh;
  background-color:#fffdf2;
}
.main-shell{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:24px;
}
.header {
  text-align: center;
  margin-bottom: 60px;
}
.title {
  font-size: 22px;
  font-weight: bold;
  color: #8d6e63;
  margin-bottom: 15px;
}
.subtitle {
  font-size: 38px;
  font-weight: 900;
  color: #ff8a65;
}
.button-container {
  display: flex;
  gap: 30px;
  flex-wrap:wrap;
  justify-content:center;
}
.btn-main {
  padding: 20px 50px;
  font-size: 20px;
  font-weight: bold;
  color: white;
  background-color: #ffb74d;
  border: none;
  border-radius: 30px;
  cursor: pointer;
  box-shadow: 0 4px 10px rgba(255, 167, 38, 0.3);
  transition: background-color 0.2s, transform 0.1s;
}
.btn-main:hover {
  background-color: #ffa726;
  transform: translateY(-2px);
}
@media (max-width:640px){
  .button-container{flex-direction:column; width:100%; max-width:340px;}
  .btn-main{width:100%;}
}



    :root{
      --bg:#fff9f0;
      --paper:#ffffff;
      --line:#ece7df;
      --text:#2f2f2f;
      --sub:#7b7b7b;
      --amber:#f59e0b;
      --amber-2:#fbbf24;
      --amber-bg:#fff3d6;
      --rose:#e11d48;
      --rose-bg:#fff1f2;
      --emerald:#059669;
      --emerald-bg:#ecfdf5;
      --blue:#2563eb;
      --blue-bg:#eff6ff;
      --gray-bg:#f8f8f8;
      --dark:#1f2937;
      --shadow:0 10px 30px rgba(0,0,0,.08);
      --radius-xl:24px;
      --radius-2xl:32px;
    }

    *{box-sizing:border-box}

    a{text-decoration:none;color:inherit}
    .hidden{display:none !important}
    .page-order{max-width:480px;margin:0 auto;min-height:100vh;background:var(--bg)}
    .page-dashboard{max-width:1400px;margin:0 auto;min-height:var(--app-height,100vh);background:#f5f5f5}

    .btn-gray{background:#efefef;color:#666}
    .btn-emerald{background:var(--emerald);color:#fff}

    .btn-rose{background:var(--rose);color:#fff}
    .btn-outline{background:#fff;border:1px solid #ddd;color:#666}

<script>
window.HaetsalCombinedApp = (function(){
  const screens = {
    main: document.getElementById('main-screen'),
    order: document.getElementById('order-screen'),
    tumbler: document.getElementById('tumbler-screen')
  };
  function showRoute(name){
    Object.keys(screens).forEach(key => {
      screens[key].classList.toggle('active', key === name);
    });
    window.scrollTo(0, 0);
    if(name === 'order' && window.OrderModule){
      if(window.OrderModule.refreshFromShared) window.OrderModule.refreshFromShared();
      if(window.OrderModule.render) window.OrderModule.render();
    }
    if(name === 'tumbler' && window.TumblerModule){
      if(window.TumblerModule.refreshFromShared) window.TumblerModule.refreshFromShared();
      if(window.TumblerModule.render) window.TumblerModule.render();
    }
  }
  document.addEventListener('click', function(event){
    const navBtn = event.target.closest('[data-nav]');
    if(!navBtn) return;
    const route = navBtn.dataset.nav;
    if(route && screens[route]) showRoute(route);
  });
  return { showRoute };
})();
</script>

<script>
window.HaetsalCloudStore = (function(){
  const listeners = {
    shared: new Set(),
    order: new Set(),
    tumbler: new Set()
  };
  const caches = {
    shared: null,
    order: null,
    tumbler: null
  };
  const pendingWrites = {};
  let saveHandler = null;

  function clone(value){
    if(value == null) return value;
    return JSON.parse(JSON.stringify(value));
  }

  function emit(key){
    const value = clone(caches[key]);
    listeners[key].forEach(listener => {
      try{
        listener(value);
      }catch(error){
        console.error(error);
      }
    });
  }

  function setCache(key, value, shouldNotify=true){
    caches[key] = clone(value);
    if(shouldNotify) emit(key);
    return clone(caches[key]);
  }

  function getCache(key, fallbackFactory){
    if(caches[key] == null){
      return typeof fallbackFactory === 'function' ? fallbackFactory() : clone(fallbackFactory);
    }
    return clone(caches[key]);
  }

  function subscribe(key, listener){
    if(typeof listener !== 'function') return function(){};
    listeners[key].add(listener);
    if(caches[key] != null){
      try{
        listener(clone(caches[key]));
      }catch(error){
        console.error(error);
      }
    }
    return function(){
      listeners[key].delete(listener);
    };
  }

  function save(key, value){
    const nextValue = setCache(key, value, true);
    if(saveHandler){
      Promise.resolve(saveHandler(key, clone(nextValue))).catch(error => {
        console.error('Firestore 저장 실패', key, error);
      });
    }else{
      pendingWrites[key] = clone(nextValue);
    }
    return clone(nextValue);
  }

  function applyRemote(key, value){
    if(value == null) return getCache(key, null);
    return setCache(key, value, true);
  }

  function registerSaveHandler(handler){
    saveHandler = handler;
    Object.keys(pendingWrites).forEach(key => {
      const value = clone(pendingWrites[key]);
      delete pendingWrites[key];
      Promise.resolve(saveHandler(key, value)).catch(error => {
        console.error('Firestore 저장 실패', key, error);
      });
    });
  }

  return {
    getShared: function(fallbackFactory){ return getCache('shared', fallbackFactory); },
    saveShared: function(value){ return save('shared', value); },
    subscribeShared: function(listener){ return subscribe('shared', listener); },
    getOrderData: function(fallbackFactory){ return getCache('order', fallbackFactory); },
    saveOrderData: function(value){ return save('order', value); },
    subscribeOrderData: function(listener){ return subscribe('order', listener); },
    getTumblerData: function(fallbackFactory){ return getCache('tumbler', fallbackFactory); },
    saveTumblerData: function(value){ return save('tumbler', value); },
    subscribeTumblerData: function(listener){ return subscribe('tumbler', listener); },
    applyRemote: applyRemote,
    registerSaveHandler: registerSaveHandler
  };
})();
</script>

<script>
window.HaetsalOperatorSession = (function(){
  const KEY = 'haetsalmaru_operator_session_v1';

  function normalizeRole(role){
    const value = String(role || '').toUpperCase();
    if(value === 'ADMIN') return 'ADMIN';
    if(value === 'MANAGER') return 'MANAGER';
    return 'GUEST';
  }

  function load(){
    try{
      const raw = window.sessionStorage ? window.sessionStorage.getItem(KEY) : '';
      if(!raw) return { role:'GUEST' };
      const parsed = JSON.parse(raw);
      return { role: normalizeRole(parsed && parsed.role) };
    }catch(error){
      return { role:'GUEST' };
    }
  }

  let state = load();

  function save(){
    try{
      if(window.sessionStorage){
        window.sessionStorage.setItem(KEY, JSON.stringify(state));
      }
    }catch(error){}
  }

  return {
    getRole: function(){ return normalizeRole(state.role); },
    isActive: function(){ return normalizeRole(state.role) !== 'GUEST'; },
    setRole: function(role){
      state = { role: normalizeRole(role) };
      save();
      return state.role;
    },
    clear: function(){
      state = { role:'GUEST' };
      save();
    },
    getTumblerRole: function(){
      return this.getRole() === 'ADMIN' ? 'admin' : this.getRole() === 'MANAGER' ? 'manager' : 'guest';
    }
  };
})();
</script>

<script>
window.HaetsalSharedStore = (function(){
  const SHARED_KEY = 'haetsalmaru_shared_people_auth_v1';
  const DEFAULT_AUTH = {
    managerPw: '1212',
    adminPw: '13123',
    managerPwUpdatedAt: '',
    adminPwUpdatedAt: ''
  };

  function nowIso(){
    return new Date().toISOString();
  }

  function makeSharedId(){
    return 'shared_user_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 8);
  }

  function clone(value){
    return JSON.parse(JSON.stringify(value));
  }

  function str(value){
    return String(value == null ? '' : value).trim();
  }

  function num(value){
    const n = Number(value);
    return Number.isFinite(n) ? n : 0;
  }

  function defaultSharedData(){
    return { auth: { ...DEFAULT_AUTH }, users: [] };
  }

  function read(){
    try{
      const stored = window.HaetsalCloudStore && window.HaetsalCloudStore.getShared
        ? window.HaetsalCloudStore.getShared(defaultSharedData)
        : defaultSharedData();
      return {
        auth: { ...DEFAULT_AUTH, ...((stored && stored.auth) || {}) },
        users: Array.isArray(stored && stored.users) ? stored.users.map(toSharedUser) : []
      };
    }catch(error){
      console.error(error);
      return defaultSharedData();
    }
  }

  function save(shared){
    const normalized = {
      auth: { ...DEFAULT_AUTH, ...((shared && shared.auth) || {}) },
      users: Array.isArray(shared && shared.users) ? shared.users.map(toSharedUser) : []
    };
    if(window.HaetsalCloudStore && window.HaetsalCloudStore.saveShared){
      window.HaetsalCloudStore.saveShared(normalized);
    }
    return normalized;
  }

  function getDept(record){
    return str((record && (record.dept || record.department)) || '');
  }

  function toSharedUser(record){
    const dept = getDept(record);
    return {
      id: str(record && record.id) || makeSharedId(),
      name: str(record && record.name),
      dept,
      department: dept,
      nickname: str(record && record.nickname),
      coupons: num(record && record.coupons),
      defaultLocation: str(record && record.defaultLocation),
      tumblerInfo: str(record && record.tumblerInfo),
      password: str(record && record.password),
      tumblerDueDate: str(record && record.tumblerDueDate),
      rentedTumbler: str(record && record.rentedTumbler),
      totalRentalCount: num(record && record.totalRentalCount),
      returnCount: num(record && record.returnCount),
      nameLocked: !!(record && record.nameLocked),
      approvedAt: str(record && record.approvedAt),
      approvedBy: str(record && record.approvedBy),
      createdAt: str(record && record.createdAt) || nowIso(),
      updatedAt: str(record && record.updatedAt) || nowIso()
    };
  }

  function findMatchingUser(users, record){
    const sourceId = str(record && record.id);
    if(sourceId){
      const byId = users.find(user => user.id === sourceId);
      if(byId) return byId;
    }
    const name = str(record && record.name).toLowerCase();
    const dept = getDept(record).toLowerCase();
    if(!name) return null;

    if(dept){
      const exact = users.find(user => str(user.name).toLowerCase() === name && getDept(user).toLowerCase() === dept);
      if(exact) return exact;
    }

    const sameName = users.filter(user => str(user.name).toLowerCase() === name);
    if(dept){
      if(sameName.length === 1 && !getDept(sameName[0])) return sameName[0];
      return null;
    }
    if(sameName.length === 1) return sameName[0];
    return null;
  }

  function applyOrderFields(target, record){
    const source = toSharedUser(record || {});
    target.name = source.name || target.name;
    target.dept = source.dept;
    target.department = source.dept;
    target.nickname = source.nickname;
    target.coupons = num(record && record.coupons);
    target.defaultLocation = source.defaultLocation;
    target.tumblerInfo = source.tumblerInfo;
    target.password = source.password;
    target.tumblerDueDate = source.tumblerDueDate;
    target.rentedTumbler = source.rentedTumbler;
    target.nameLocked = !!source.nameLocked;
    target.approvedAt = source.approvedAt;
    target.approvedBy = source.approvedBy;
    target.createdAt = str(target.createdAt) || source.createdAt || nowIso();
    target.updatedAt = nowIso();
    return target;
  }

  function applyTumblerFields(target, record){
    const source = toSharedUser(record || {});
    target.name = source.name || target.name;
    if(source.dept){
      target.dept = source.dept;
      target.department = source.dept;
    }
    target.totalRentalCount = Math.max(num(target.totalRentalCount), num(record && record.totalRentalCount));
    target.returnCount = Math.max(num(target.returnCount), num(record && record.returnCount));
    target.createdAt = str(target.createdAt) || source.createdAt || nowIso();
    target.updatedAt = nowIso();
    return target;
  }

  function pickLaterTimestamp(a, b){
    const timeA = a ? new Date(a).getTime() : 0;
    const timeB = b ? new Date(b).getTime() : 0;
    return timeA >= timeB ? a : b;
  }

  function resolveAuth(sharedAuth, localSettings){
    const next = { ...DEFAULT_AUTH, ...(sharedAuth || {}) };
    const local = { ...DEFAULT_AUTH, ...(localSettings || {}) };
    [
      ['managerPw', 'managerPwUpdatedAt'],
      ['adminPw', 'adminPwUpdatedAt']
    ].forEach(([field, timeField]) => {
      const sharedValue = str(next[field]) || DEFAULT_AUTH[field];
      const sharedTime = str(next[timeField]);
      const localValue = str(local[field]) || DEFAULT_AUTH[field];
      const localTime = str(local[timeField]);

      if(localTime && (!sharedTime || new Date(localTime).getTime() > new Date(sharedTime).getTime())){
        next[field] = localValue;
        next[timeField] = localTime;
        return;
      }
      if(sharedTime && (!localTime || new Date(sharedTime).getTime() > new Date(localTime).getTime())){
        return;
      }
      if(sharedValue !== localValue){
        if(localValue !== DEFAULT_AUTH[field] && sharedValue === DEFAULT_AUTH[field]){
          next[field] = localValue;
          next[timeField] = localTime || nowIso();
        }else if(sharedValue !== DEFAULT_AUTH[field] && localValue === DEFAULT_AUTH[field]){
          return;
        }else{
          next[field] = localValue || sharedValue || DEFAULT_AUTH[field];
          next[timeField] = pickLaterTimestamp(sharedTime, localTime) || nowIso();
        }
      }
    });
    return next;
  }

  function exportOrderUsers(sharedUsers){
    return (sharedUsers || []).map(user => ({
      id: user.id,
      name: str(user.name),
      dept: getDept(user),
      nickname: str(user.nickname),
      coupons: num(user.coupons),
      defaultLocation: str(user.defaultLocation),
      tumblerInfo: str(user.tumblerInfo),
      password: str(user.password),
      tumblerDueDate: str(user.tumblerDueDate),
      rentedTumbler: str(user.rentedTumbler),
      totalRentalCount: num(user.totalRentalCount),
      returnCount: num(user.returnCount),
      nameLocked: !!user.nameLocked,
      approvedAt: str(user.approvedAt),
      approvedBy: str(user.approvedBy),
      createdAt: str(user.createdAt),
      updatedAt: str(user.updatedAt)
    }));
  }

  function exportTumblerStaff(sharedUsers){
    return (sharedUsers || []).map(user => ({
      id: user.id,
      name: str(user.name),
      department: getDept(user),
      totalRentalCount: num(user.totalRentalCount),
      returnCount: num(user.returnCount),
      createdAt: str(user.createdAt),
      updatedAt: str(user.updatedAt)
    }));
  }

  function categoryLabel(type, number){
    if(type === 'ice') return '아이스 ' + number + '번';
    if(type === 'hot') return '핫 ' + number + '번';
    if(type === 'store_ice') return '일반컵(아이스) ' + number + '번';
    if(type === 'store_hot') return '일반컵(핫) ' + number + '번';
    if(type === 'store_gen') return '일반컵(공용) ' + number + '번';
    return String(type || '') + ' ' + String(number || '');
  }

  function applyRentalSnapshot(sharedUsers, tumblers){
    const rentalMap = {};
    (tumblers || []).forEach(item => {
      if(item && item.status === 'rented' && item.currentUserId){
        const userId = String(item.currentUserId);
        if(!rentalMap[userId]){
          rentalMap[userId] = { dueDate: '', labels: [] };
        }
        if(item.dueDate){
          if(!rentalMap[userId].dueDate || new Date(item.dueDate).getTime() < new Date(rentalMap[userId].dueDate).getTime()){
            rentalMap[userId].dueDate = item.dueDate;
          }
        }
        rentalMap[userId].labels.push(categoryLabel(item.type, item.number));
      }
    });

    return (sharedUsers || []).map(user => {
      const snapshot = rentalMap[user.id];
      return {
        ...toSharedUser(user),
        tumblerDueDate: snapshot ? str(snapshot.dueDate) : '',
        rentedTumbler: snapshot ? snapshot.labels.join(', ') : ''
      };
    });
  }

  function syncOrderData(orderData){
    const localData = clone(orderData || {});
    const shared = read();
    const users = Array.isArray(shared.users) ? shared.users.map(toSharedUser) : [];

    (Array.isArray(localData.users) ? localData.users : []).forEach(record => {
      let target = findMatchingUser(users, record);
      if(!target){
        target = toSharedUser(record);
        users.push(target);
      }
      applyOrderFields(target, record);
    });

    shared.auth = resolveAuth(shared.auth, localData.sysSettings || {});
    shared.users = users.map(toSharedUser);
    save(shared);

    return {
      ...localData,
      users: exportOrderUsers(shared.users),
      sysSettings: {
        ...(localData.sysSettings || {}),
        managerPw: shared.auth.managerPw,
        adminPw: shared.auth.adminPw,
        managerPwUpdatedAt: shared.auth.managerPwUpdatedAt,
        adminPwUpdatedAt: shared.auth.adminPwUpdatedAt
      }
    };
  }

  function syncTumblerData(tumblerData){
    const localData = clone(tumblerData || {});
    const shared = read();
    const users = Array.isArray(shared.users) ? shared.users.map(toSharedUser) : [];
    const idMap = {};

    (Array.isArray(localData.staff) ? localData.staff : []).forEach(record => {
      let target = findMatchingUser(users, record);
      if(!target){
        target = toSharedUser(record);
        users.push(target);
      }
      applyTumblerFields(target, record);
      if(record && record.id) idMap[String(record.id)] = target.id;
    });

    const remappedTumblers = (Array.isArray(localData.tumblers) ? localData.tumblers : []).map(item => {
      if(!item || !item.currentUserId) return item;
      const directId = String(item.currentUserId);
      let nextUserId = idMap[directId] || (users.some(user => user.id === directId) ? directId : '');
      if(!nextUserId && item.currentUserName){
        const byName = users.filter(user => str(user.name) === str(item.currentUserName));
        if(byName.length === 1) nextUserId = byName[0].id;
      }
      if(!nextUserId) return item;
      const user = users.find(entry => entry.id === nextUserId);
      return {
        ...item,
        currentUserId: nextUserId,
        currentUserName: user ? user.name : item.currentUserName
      };
    });

    shared.users = applyRentalSnapshot(users, remappedTumblers).map(toSharedUser);
    shared.auth = resolveAuth(shared.auth, localData.settings || {});
    save(shared);

    return {
      ...localData,
      tumblers: remappedTumblers,
      staff: exportTumblerStaff(shared.users),
      settings: {
        ...(localData.settings || {}),
        managerPw: shared.auth.managerPw,
        adminPw: shared.auth.adminPw,
        managerPwUpdatedAt: shared.auth.managerPwUpdatedAt,
        adminPwUpdatedAt: shared.auth.adminPwUpdatedAt
      }
    };
  }

  function hydrateOrderData(orderData){
    const localData = clone(orderData || {});
    const shared = read();
    return {
      ...localData,
      users: exportOrderUsers(shared.users),
      sysSettings: {
        ...(localData.sysSettings || {}),
        managerPw: shared.auth.managerPw,
        adminPw: shared.auth.adminPw,
        managerPwUpdatedAt: shared.auth.managerPwUpdatedAt,
        adminPwUpdatedAt: shared.auth.adminPwUpdatedAt
      }
    };
  }

  function hydrateTumblerData(tumblerData){
    const localData = clone(tumblerData || {});
    const shared = read();
    return {
      ...localData,
      staff: exportTumblerStaff(shared.users),
      settings: {
        ...(localData.settings || {}),
        managerPw: shared.auth.managerPw,
        adminPw: shared.auth.adminPw,
        managerPwUpdatedAt: shared.auth.managerPwUpdatedAt,
        adminPwUpdatedAt: shared.auth.adminPwUpdatedAt
      }
    };
  }

  return {
    read,
    save,
    syncOrderData,
    syncTumblerData,
    hydrateOrderData,
    hydrateTumblerData
  };
})();
</script>

    function normalizeStoredOrderData(raw){
      return {
        ...defaultData(),
        ...(raw || {}),
        sysSettings: { ...defaultData().sysSettings, ...(((raw || {}).sysSettings) || {}) },
        users: Array.isArray(raw && raw.users) ? raw.users : [],
        orders: Array.isArray(raw && raw.orders) ? raw.orders : [],
        logs: Array.isArray(raw && raw.logs) ? raw.logs : [],
        registrationRequests: Array.isArray(raw && raw.registrationRequests) ? raw.registrationRequests : []
      };
    }

    function loadData(){
      try{
        const stored = window.HaetsalCloudStore && window.HaetsalCloudStore.getOrderData
          ? window.HaetsalCloudStore.getOrderData(defaultData)
          : defaultData();
        const normalized = normalizeStoredOrderData(stored);
        if(window.HaetsalSharedStore && window.HaetsalSharedStore.syncOrderData){
          return window.HaetsalSharedStore.syncOrderData(normalized);
        }
        return normalized;
      }catch(error){
        console.error('저장 데이터 불러오기 실패', error);
        return defaultData();
      }
    }

    function saveData(){
      try{
        let payload = {
          users: state.users,
          orders: state.orders,
          logs: state.logs,
          registrationRequests: state.registrationRequests,
          sysSettings: state.sysSettings
        };
        if(window.HaetsalSharedStore && window.HaetsalSharedStore.syncOrderData){
          payload = window.HaetsalSharedStore.syncOrderData(payload);
          state.users = Array.isArray(payload.users) ? payload.users : state.users;
          state.sysSettings = { ...state.sysSettings, ...(payload.sysSettings || {}) };
        }
        const normalized = normalizeStoredOrderData({
          users: state.users,
          orders: state.orders,
          logs: state.logs,
          registrationRequests: state.registrationRequests,
          sysSettings: state.sysSettings
        });
        if(window.HaetsalCloudStore && window.HaetsalCloudStore.saveOrderData){
          window.HaetsalCloudStore.saveOrderData(normalized);
        }
        state.saveState = 'saved';
        state.saveStateText = `저장 완료 ${formatAMPM(new Date())}`;
      }catch(error){
        console.error('주문 데이터 저장 실패', error);
        state.saveState = 'error';
        state.saveStateText = '저장 실패';
      }
    }

    function applyCloudData(nextData){
      const normalized = normalizeStoredOrderData(nextData);
      const synced = window.HaetsalSharedStore && window.HaetsalSharedStore.syncOrderData
        ? window.HaetsalSharedStore.syncOrderData(normalized)
        : normalized;
      state.users = Array.isArray(synced.users) ? synced.users : [];
      state.orders = Array.isArray(synced.orders) ? synced.orders : [];
      state.logs = Array.isArray(synced.logs) ? synced.logs : [];
      state.registrationRequests = Array.isArray(synced.registrationRequests) ? synced.registrationRequests : [];
      state.sysSettings = { ...defaultData().sysSettings, ...((synced && synced.sysSettings) || {}) };
      normalizeOrdersRuntime();
      state.noticeLinkDraft = state.sysSettings.noticeLink || '';
      state.saveState = 'saved';
      state.saveStateText = `동기화 완료 ${formatAMPM(new Date())}`;
      render();
    }

    function refreshFromShared(){
      if(!(window.HaetsalSharedStore && window.HaetsalSharedStore.hydrateOrderData)) return;
      const hydrated = window.HaetsalSharedStore.hydrateOrderData({
        users: state.users,
        orders: state.orders,
        logs: state.logs,
        registrationRequests: state.registrationRequests,
        sysSettings: state.sysSettings
      });
      state.users = Array.isArray(hydrated.users) ? hydrated.users : state.users;
      state.registrationRequests = Array.isArray(hydrated.registrationRequests) ? hydrated.registrationRequests : state.registrationRequests;
      state.sysSettings = { ...state.sysSettings, ...(hydrated.sysSettings || {}) };
    }

    const state = {
      ...loadData(),
      ...defaultSession()
    };
    normalizeOrdersRuntime();
    state.noticeLinkDraft = state.sysSettings.noticeLink || '';

    function renderSaveStatusChip(){
      const kind = state.saveState === 'error' ? 'error' : 'saved';
      const icon = kind === 'error' ? '⚠️' : '💾';
      return `<span class="save-status-chip ${kind}">${icon} ${escapeHtml(state.saveStateText || (kind === 'error' ? '저장 실패' : '저장 준비'))}</span>`;
    }

    function addAuditLog(action, extra){
      state.logs.push({
        id: uid('log'),
        action,
        changedBy: getCurrentActorLabel(),
        timestamp: new Date().toISOString(),
        ...(extra || {})
      });
    }

    // =========================================================
    // [2] 유틸리티 함수
    // =========================================================
    function uid(prefix='id'){
      return prefix + '_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2,8);
    }

    function escapeHtml(value){
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function getChosung(str){
      const chosungList = ['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
      let result = '';
      const text = String(str || '');
      for(let i=0;i<text.length;i++){
        const code = text.charCodeAt(i) - 44032;
        if(code > -1 && code < 11172) result += chosungList[Math.floor(code / 588)];
        else result += text.charAt(i);
      }
      return result;
    }

    function formatAMPM(date){
      const d = date instanceof Date ? date : new Date(date);
      if(Number.isNaN(d.getTime())) return '';
      let hours = d.getHours();
      let minutes = d.getMinutes();
      const ampm = hours >= 12 ? '오후' : '오전';
      hours = hours % 12 || 12;
      minutes = String(minutes).padStart(2, '0');
      return `${ampm} ${hours}:${minutes}`;
    }

    function getDateString(date){
      const d = date instanceof Date ? date : new Date(date);
      const y = d.getFullYear();
      const m = String(d.getMonth()+1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${y}-${m}-${day}`;
    }

    function getOverdueDays(dueDateStr){
      if(!dueDateStr) return 0;
      const due = new Date(dueDateStr);
      due.setHours(0,0,0,0);
      const today = new Date();
      today.setHours(0,0,0,0);
      const diff = today.getTime() - due.getTime();
      const days = Math.floor(diff / (1000*60*60*24));
      return days > 0 ? days : 0;
    }

    function getUserById(id){
      return state.users.find(u => u.id === id) || null;
    }

    function getOrderById(id){
      return state.orders.find(o => o.id === id) || null;
    }

    function todayYmd(){
      return getDateString(new Date());
    }

    function isStaff(){
      return state.appRole === 'MANAGER' || state.appRole === 'ADMIN';
    }

    function getCurrentActorLabel(){
      return state.appRole === 'ADMIN' ? '최고 관리자' : state.appRole === 'MANAGER' ? '매니저' : '사용자';
    }

    function getCompactDateString(dateValue){
      const d = new Date(dateValue || new Date());
      return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
    }

    function getNormalizedOrderStatus(orderOrStatus, deliveryType='PICKUP'){
      const order = typeof orderOrStatus === 'object' && orderOrStatus !== null
        ? orderOrStatus
        : { status: orderOrStatus, deliveryType };
      const raw = String((order && order.status) || 'PENDING').toUpperCase();
      if(raw === 'DELIVERY_DONE' || raw === 'PICKUP_DONE' || raw === 'CANCELLED' || raw === 'PENDING') return raw;
      if(raw === 'COMPLETED' || raw === 'DONE') return (order && order.deliveryType) === 'DELIVERY' ? 'DELIVERY_DONE' : 'PICKUP_DONE';
      return 'PENDING';
    }

    function isOrderClosedStatus(orderOrStatus, deliveryType='PICKUP'){
      const status = getNormalizedOrderStatus(orderOrStatus, deliveryType);
      return status === 'PICKUP_DONE' || status === 'DELIVERY_DONE' || status === 'CANCELLED';
    }

    function isOrderOpenStatus(orderOrStatus, deliveryType='PICKUP'){
      return !isOrderClosedStatus(orderOrStatus, deliveryType);
    }

    function getOrderProcessedTimestamp(order){
      return order && (order.processedAt || order.completedAt || order.timestamp) ? (order.processedAt || order.completedAt || order.timestamp) : '';
    }

    function getOrderStatusLabel(orderOrStatus, deliveryType='PICKUP'){
      const status = getNormalizedOrderStatus(orderOrStatus, deliveryType);
      if(status === 'PICKUP_DONE') return '제작완료';
      if(status === 'DELIVERY_DONE') return '배달완료';
      if(status === 'CANCELLED') return '취소완료';
      return '대기';
    }

    function getOrderStatusBadgeClass(orderOrStatus, deliveryType='PICKUP'){
      const status = getNormalizedOrderStatus(orderOrStatus, deliveryType);
      if(status === 'PICKUP_DONE') return 'status-chip green';
      if(status === 'DELIVERY_DONE') return 'status-chip blue';
      if(status === 'CANCELLED') return 'status-chip rose';
      return 'pill gray';
    }

    function normalizeOrderRuntime(order){
      if(!order || typeof order !== 'object') return false;
      let changed = false;
      const normalizedStatus = getNormalizedOrderStatus(order);
      if(order.status !== normalizedStatus){
        order.status = normalizedStatus;
        changed = true;
      }
      if(!order.userNameReal && order.userName){ order.userNameReal = order.userName; changed = true; }
      if(!order.userNameDisplay && (order.userNameReal || order.userName)){ order.userNameDisplay = order.userNameReal || order.userName; changed = true; }
      if(isOrderClosedStatus(order) && !order.processedAt){
        order.processedAt = order.timestamp || new Date().toISOString();
        changed = true;
      }
      return changed;
    }

    function normalizeOrdersRuntime(){
      let changed = false;
      (state.orders || []).forEach(order => {
        if(normalizeOrderRuntime(order)) changed = true;
      });
      return changed;
    }

    function getFilteredUsers(searchTerm){
      const term = String(searchTerm || '').trim().toLowerCase();
      if(!term) return [];
      const isChosungOnly = /^[ㄱ-ㅎ]+$/.test(term);
      const users = Array.isArray(state.users) ? state.users : [];

      const exactMatches = users.filter(user => {
        const name = String(user.name || '').trim().toLowerCase();
        const nick = String(user.nickname || '').trim().toLowerCase();
        return name === term || (nick && nick === term);
      });
      if(exactMatches.length) return exactMatches;

      const textMatches = users.filter(user => {
        const name = String(user.name || '').trim().toLowerCase();
        const nick = String(user.nickname || '').trim().toLowerCase();
        return name.startsWith(term) || (nick && nick.startsWith(term)) || name.includes(term) || (nick && nick.includes(term));
      });
      if(textMatches.length && !isChosungOnly) return textMatches;

      const chosung = isChosungOnly ? term : getChosung(term);
      return users.filter(user => {
        const name = String(user.name || '').trim().toLowerCase();
        return getChosung(name).includes(chosung);
      });
    }

    function getTodaySchedules(type){
      const schedules = state.sysSettings.schedules || [];
      const today = new Date();
      const dateStr = getDateString(today);
      const dayOfWeek = today.getDay();
      return schedules.filter(item => {
        if(item.type !== type) return false;
        if(item.repeatMode === 'ONCE' && item.date === dateStr) return true;
        if(item.repeatMode === 'WEEKLY' && Array.isArray(item.weekdays) && item.weekdays.map(String).includes(String(dayOfWeek))) return true;
        return false;
      });
    }

    function checkIsPausedNow(schedules){
      const now = new Date();
      const current = now.getHours() * 60 + now.getMinutes();
      return schedules.some(item => {
        if(!item.startTime || !item.endTime) return false;
        const [sh, sm] = item.startTime.split(':').map(Number);
        const [eh, em] = item.endTime.split(':').map(Number);
        const start = sh * 60 + sm;
        const end = eh * 60 + em;
        return current >= start && current <= end;
      });
    }

    function isOrderAvailable(){
      if(state.sysSettings.isOrderSuspended) return false;
      if(checkIsPausedNow(getTodaySchedules('ORDER'))) return false;
      return true;
    }

    function isDeliveryAvailable(){
      if(state.sysSettings.isDeliveryPaused) return false;
      if(checkIsPausedNow(getTodaySchedules('DELIVERY'))) return false;
      return true;
    }

    function activeNotices(){
      const now = new Date();
      const current = now.getHours() * 60 + now.getMinutes();
      return [...getTodaySchedules('ORDER'), ...getTodaySchedules('DELIVERY')].filter(item => {
        if(!item.reason || !item.endTime) return false;
        const [eh, em] = item.endTime.split(':').map(Number);
        return current <= (eh*60+em);
      });
    }

    function getTumblerDashboardSnapshot(){
      try{
        const module = window.TumblerModule;
        if(!(module && module.state && module.state.data)){
          return { ready:false, rented:[], overdue:[], todayActivities:[], cleaningCount:0, availableIce:0, availableHot:0, availableStore:0, availableTotal:0 };
        }
        if(module.refreshFromShared) module.refreshFromShared();
        const data = module.state.data || {};
        const tumblers = Array.isArray(data.tumblers) ? data.tumblers : [];
        const history = Array.isArray(data.rentalHistory) ? data.rentalHistory : [];
        const rented = tumblers
          .filter(item => item && item.status === 'rented')
          .sort((a,b) => new Date(a.rentalDate || 0) - new Date(b.rentalDate || 0));
        const overdue = rented.filter(item => {
          if(!item.dueDate) return false;
          const due = new Date(item.dueDate);
          const today = new Date();
          due.setHours(0,0,0,0);
          today.setHours(0,0,0,0);
          return today.getTime() > due.getTime();
        });
        const today = todayYmd();
        const todayActivities = history
          .filter(item => {
            const rentedDay = item && item.rentalDate ? getDateString(item.rentalDate) : '';
            const returnedDay = item && item.returnedAt ? getDateString(item.returnedAt) : '';
            return rentedDay === today || returnedDay === today;
          })
          .sort((a,b) => new Date((b && (b.returnedAt || b.rentalDate)) || 0) - new Date((a && (a.returnedAt || a.rentalDate)) || 0))
          .slice(0, 8);
        return {
          ready:true,
          rented,
          overdue,
          todayActivities,
          cleaningCount: tumblers.filter(item => item && item.status === 'cleaning').length,
          availableIce: tumblers.filter(item => item && item.status === 'available' && item.type === 'ice').length,
          availableHot: tumblers.filter(item => item && item.status === 'available' && item.type === 'hot').length,
          availableStore: tumblers.filter(item => item && item.status === 'available' && ['store_ice','store_hot','store_gen'].includes(item.type)).length,
          availableTotal: tumblers.filter(item => item && item.status === 'available').length
        };
      }catch(error){
        console.error(error);
        return { ready:false, rented:[], overdue:[], todayActivities:[], cleaningCount:0, availableIce:0, availableHot:0, availableStore:0, availableTotal:0 };
      }
    }

    function handleApproveRegistrationRequest(requestId){
      const request = state.registrationRequests.find(item => item.id === requestId);
      if(!request){ showMessage('신청 내역을 찾을 수 없습니다.'); return; }
      if(request.status !== 'PENDING'){ showMessage('대기 중인 신청만 승인할 수 있습니다.'); return; }
      if(findExistingUserByNameDept(request.name, request.dept)){
        showMessage('이미 같은 이름과 부서의 사용자가 등록되어 있습니다.');
        return;
      }
      const actorLabel = getCurrentActorLabel();
      state.users.push(createApprovedUserFromRequest(request, actorLabel));
      request.status = 'APPROVED';
      request.reviewedAt = new Date().toISOString();
      request.reviewedBy = actorLabel;
      request.rejectReason = '';
      addAuditLog('REGISTRATION_REQUEST_APPROVED', {
        requestedName: request.name,
        requestedDept: request.dept,
        requestId: request.id
      });
      saveData();
      render();
      showMessage('등록 신청이 승인되었습니다.');
    }

    function handleRejectRegistrationRequest(){
      const request = state.registrationRequests.find(item => item.id === state.rejectRequestTargetId);
      if(!request){ showMessage('신청 내역을 찾을 수 없습니다.'); return; }
      if(request.status !== 'PENDING'){ showMessage('대기 중인 신청만 반려할 수 있습니다.'); return; }
      const preset = String(state.rejectReasonPreset || '').trim();
      const custom = String(state.rejectReasonText || '').trim();
      const reason = [preset, custom].filter(Boolean).join(preset && custom ? ' - ' : '');
      if(!reason){
        showMessage('반려 사유를 입력하거나 선택해주세요.');
        return;
      }
      request.status = 'REJECTED';
      request.reviewedAt = new Date().toISOString();
      request.reviewedBy = getCurrentActorLabel();
      request.rejectReason = reason;
      addAuditLog('REGISTRATION_REQUEST_REJECTED', {
        requestedName: request.name,
        requestedDept: request.dept,
        requestId: request.id,
        reason
      });
      saveData();
      state.showRejectRequestModal = false;
      state.rejectRequestTargetId = null;
      state.rejectReasonPreset = '';
      state.rejectReasonText = '';
      render();
      showMessage('등록 신청이 반려되었습니다.');
    }

    function getFilteredRegistrationHistoryItems(){
      const filter = String(state.registrationHistoryFilter || 'ALL').toUpperCase();
      const term = String(state.registrationHistorySearch || '').trim().toLowerCase();
      return (state.registrationRequests || []).filter(item => {
        const status = String(item.status || '').toUpperCase();
        if(status === 'PENDING') return false;
        if(filter !== 'ALL' && status !== filter) return false;
        if(!term) return true;
        const haystack = [item.name, item.dept, item.defaultLocation, item.tumblerInfo, item.rejectReason, item.reviewedBy]
          .map(value => String(value || '').toLowerCase()).join(' ');
        return haystack.includes(term);
      }).sort((a,b) => new Date(b.reviewedAt || b.requestedAt || 0) - new Date(a.reviewedAt || a.requestedAt || 0));
    }

    function handleSelfRegister(){
      const inputName = state.selfRegData.name.trim();
      const inputDept = state.selfRegData.dept.trim();
      if(!inputName){ showMessage('이름을 입력해주세요.'); return; }
      if(findExistingUserByNameDept(inputName, inputDept)){
        showMessage('이미 등록된 사용자입니다.');
        return;
      }
      if(findPendingRequestByNameDept(inputName, inputDept)){
        showMessage('현재 등록 신청이 검토 중입니다.');
        return;
      }

      state.registrationRequests.push({
        id: uid('req'),
        name: inputName,
        dept: inputDept,
        defaultLocation: state.selfRegData.defaultLocation.trim(),
        tumblerInfo: state.selfRegData.tumblerInfo.trim(),
        status: 'PENDING',
        requestedAt: new Date().toISOString(),
        reviewedAt: '',
        reviewedBy: '',
        rejectReason: ''
      });
      addAuditLog('REGISTRATION_REQUEST_SUBMITTED', {
        requestedName: inputName,
        requestedDept: inputDept
      });
      saveData();
      state.showSelfRegModal = false;
      state.selfRegStep = 'INPUT';
      state.duplicateUserIds = [];
      state.selfRegData = { name:'', dept:'', defaultLocation:'', tumblerInfo:'' };
      render();
      showMessage('등록 신청이 접수되었습니다.\n관리자 검토 후 이용 가능합니다.');
    }

    function handleFinalOrder(userId, qty, memoText, proxyMode=false){
      const user = getUserById(userId);
      if(!user){ showMessage('사용자를 찾을 수 없습니다.'); return; }
      if(!proxyMode && !isStaff() && !isOrderAvailable()){
        showMessage('현재 주문 접수가 중단된 상태입니다.');
        return;
      }
      if(state.deliveryType === 'DELIVERY' && !state.tempLocation.trim()){
        showMessage('배달 받으실 장소를 입력해주세요.');
        return;
      }
      const now = new Date();
      const today = getCompactDateString(now);
      const timeCode = `${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}`;
      const currentSeq = String(state.sysSettings.sequenceDate || '') === today
        ? Number(state.sysSettings.sequence || 1)
        : 1;
      const orderNumber = `ORD-${today}-${timeCode}-${String(currentSeq).padStart(3,'0')}`;
      const overdueDays = getOverdueDays(user.tumblerDueDate);
      const remainingCoupons = Number(user.coupons || 0) - Number(qty || 1);
      const order = {
        id: uid('order'),
        orderNumber,
        seq: currentSeq,
        userId: user.id,
        userName: user.name,
        userNameReal: user.name,
        userNameDisplay: user.name,
        userDept: user.dept || '',
        quantity: Number(qty || 1),
        memo: memoText || '',
        remainingCoupons,
        timestamp: now.toISOString(),
        isGroupOrder: Number(qty || 1) >= 5,
        status: 'PENDING',
        cupType: state.cupType,
        tumblerInfo: state.cupType === 'TUMBLER' ? state.tempTumblerInfo : '',
        deliveryType: state.deliveryType,
        deliveryLocation: state.deliveryType === 'DELIVERY' ? state.tempLocation : '',
        rentedTumbler: user.rentedTumbler || '',
        overdueDays
      };
      state.orders.push(order);
      user.coupons = remainingCoupons;
      if(state.deliveryType === 'DELIVERY' && state.isLocationPermanent){
        user.defaultLocation = state.tempLocation;
      }
      if(state.cupType === 'TUMBLER' && state.isTumblerPermanent){
        user.tumblerInfo = state.tempTumblerInfo;
      }
      state.sysSettings.sequence = currentSeq + 1;
      state.sysSettings.sequenceDate = today;
      addAuditLog('ORDER_CREATED', {
        userId: user.id,
        orderId: order.id,
        qty: Number(qty || 1),
        status: order.status,
        deliveryType: order.deliveryType || 'PICKUP'
      });
      saveData();

      if(proxyMode){
        render();
        if(overdueDays > 0){
          showMessage(`${user.name}(${user.dept || ''})님 ${qty}잔 접수 완료!\n(※ 주의: 대여 텀블러(${user.rentedTumbler || '정보 없음'}) 반납일로부터 ${overdueDays}일 연체된 사용자입니다.)`);
        }else{
          showMessage(`${user.name}(${user.dept || ''})님 ${qty}잔 주문이 정상적으로 접수되었습니다.`);
        }
        return;
      }

      state.currentOrderId = order.id;
      state.currentView = 'ORDER_COMPLETE';
      state.ocShowSettings = false;
      state.ocShowHistory = false;
      render();
    }

    function handleSaveUserEdit(){
      const user = getUserById(state.viewingUserId || state.editingUserId);
      if(!user){ showMessage('사용자를 찾을 수 없습니다.'); return; }
      if(!state.editUserData.name.trim()){
        showMessage('이름을 입력하세요.');
        return;
      }
      if(user.nameLocked && state.editUserData.name.trim() !== String(user.name || '').trim()){
        showMessage('승인된 사용자의 이름은 일반 수정에서 변경할 수 없습니다.');
        return;
      }
      const nextCoupons = Number(state.editUserData.coupons);
      if(!Number.isFinite(nextCoupons) || nextCoupons < 0){
        showMessage('잔여 쿠폰 수량을 올바르게 입력하세요.');
        return;
      }
      const currentCoupons = Number(user.coupons || 0);
      const couponDiff = nextCoupons - currentCoupons;
      const couponReason = String(state.editUserData.couponReason || '').trim();
      if(couponDiff !== 0 && !couponReason){
        showMessage('잔여 쿠폰 수량을 변경한 경우 사유를 입력하세요.');
        return;
      }

      user.name = user.nameLocked ? user.name : state.editUserData.name.trim();
      user.dept = state.editUserData.dept.trim();
      user.nickname = state.editUserData.nickname.trim();
      user.defaultLocation = state.editUserData.defaultLocation.trim();
      user.tumblerInfo = state.editUserData.tumblerInfo.trim();
      user.coupons = nextCoupons;
      if(state.userDetailPasswordReset){
        user.password = '';
      }

      if(couponDiff !== 0){
        state.logs.push({
          id: uid('log'),
          userId: user.id,
          action: couponDiff > 0 ? 'CHARGE_COUPON' : 'DEDUCT_COUPON',
          amount: Math.abs(couponDiff),
          reason: couponReason,
          changedBy: getCurrentActorLabel(),
          timestamp: new Date().toISOString()
        });
      }

      saveData();
      state.editingUserId = null;
      state.userDetailEditMode = false;
      state.userDetailPasswordReset = false;
      render();
      showMessage('사용자 정보가 수정되었습니다.');
    }

    function handleBulkCouponChange(){
      if(state.selectedUserIds.length === 0){ showMessage('선택된 사용자가 없습니다.'); return; }
      if(Number(state.couponAmount || 0) <= 0){ showMessage('올바른 수량을 입력하세요.'); return; }
      const finalReason = state.couponReason === '기타' ? state.customReason.trim() : state.couponReason;
      if(state.couponReason === '기타' && !finalReason){ showMessage('사유를 입력하세요.'); return; }
      const isCharge = state.couponAction === 'CHARGE';
      if(!window.confirm(`선택한 ${state.selectedUserIds.length}명의 사용자에게 ${state.couponAmount}장의 쿠폰을 ${isCharge ? '추가' : '차감'}하시겠습니까?\n사유: ${finalReason}`)) return;
      const now = new Date().toISOString();
      state.selectedUserIds.forEach(userId => {
        const user = getUserById(userId);
        if(!user) return;
        const delta = isCharge ? Number(state.couponAmount) : -Number(state.couponAmount);
        user.coupons = Number(user.coupons || 0) + delta;
        state.logs.push({
          id: uid('log'),
          userId,
          action: isCharge ? 'CHARGE_COUPON' : 'DEDUCT_COUPON',
          amount: Number(state.couponAmount),
          reason: finalReason,
          changedBy: getCurrentActorLabel(),
          timestamp: now
        });
      });
      saveData();
      state.showCouponModal = false;
      state.selectedUserIds = [];
      render();
      showMessage('쿠폰 조정이 완료되었습니다.');
    }

    function getStatsOrders(){
      const now = new Date();
      const startOfDay = d => new Date(d.getFullYear(), d.getMonth(), d.getDate(), 0,0,0);
      const endOfDay = d => new Date(d.getFullYear(), d.getMonth(), d.getDate(), 23,59,59);
      let start, end;
      if(state.statsPeriodType === 'DAY'){
        start = startOfDay(now);
        end = endOfDay(now);
      }else if(state.statsPeriodType === 'WEEK'){
        start = new Date(now);
        start.setDate(now.getDate() - now.getDay());
        start = startOfDay(start);
        end = endOfDay(now);
      }else if(state.statsPeriodType === 'MONTH'){
        start = new Date(now.getFullYear(), now.getMonth(), 1, 0,0,0);
        end = endOfDay(now);
      }else{
        start = startOfDay(new Date(state.statsStartDate));
        end = endOfDay(new Date(state.statsEndDate));
      }
      return state.orders.filter(order => {
        const t = new Date(order.timestamp);
        return t >= start && t <= end;
      });
    }

    function getCombinedHistory(userId, limitCount){
      const items = [
        ...state.orders
          .filter(order => order.userId === userId)
          .map(order => ({
            id: order.id,
            type: 'ORDER',
            timestamp: new Date(getOrderProcessedTimestamp(order) || order.timestamp),
            qty: order.quantity,
            status: order.status,
            deliveryType: order.deliveryType || 'PICKUP'
          })),
        ...state.logs
          .filter(log => log.userId === userId && (log.action === 'CHARGE_COUPON' || log.action === 'DEDUCT_COUPON' || log.action === 'FORCE_RENAME'))
          .map(log => ({
            id: log.id,
            type: log.action === 'CHARGE_COUPON' ? 'COUPON_CHARGE' : log.action === 'DEDUCT_COUPON' ? 'COUPON_DEDUCT' : 'RENAME',
            timestamp: new Date(log.timestamp),
            qty: log.amount,
            reason: log.reason,
            changedBy: log.changedBy || '',
            oldName: log.oldName || '',
            newName: log.newName || '',
            status: 'DONE'
          }))
      ].sort((a,b) => b.timestamp - a.timestamp);
      return typeof limitCount === 'number' ? items.slice(0, limitCount) : items;
    }

    function handleDeleteUser(userId){
      const user = getUserById(userId);
      if(!user){ showMessage('사용자를 찾을 수 없습니다.'); return; }
      const hasPendingOrders = state.orders.some(order => order.userId === userId && isOrderOpenStatus(order));

        return;
      }
      const hasActiveTumbler = !!String(user.rentedTumbler || '').trim();

        return renderOrderMainView();
      }
      const orderDate = new Date(order.timestamp);
      const dateStr = `${orderDate.getFullYear()}년 ${orderDate.getMonth()+1}월 ${orderDate.getDate()}일`;
      const timeStr = formatAMPM(orderDate);

      return `
        <div class="page-order">
          ${networkBar()}
          <div class="complete-wrap">

            ${Number(order.overdueDays || 0) > 0 ? `

            ${Number(order.remainingCoupons || 0) <= 3 ? `<div class="warning-banner">⚠️ 쿠폰이 부족합니다. 충전해주세요!</div>` : ''}

            <div class="card order-summary">
              <div class="summary-row"><div class="k">고객명</div><div class="v">${escapeHtml(order.userNameDisplay || order.userName)} <span class="muted">(${escapeHtml(order.userDept || '소속없음')})</span></div></div>
              <div class="summary-row"><div class="k">주문수량</div><div class="v">${Number(order.quantity || 0)}잔</div></div>
              <div class="summary-row"><div class="k">수령방법</div><div class="v">${order.deliveryType === 'DELIVERY' ? `🚚 배달 (${escapeHtml(order.deliveryLocation || '')})` : '🏪 매장 픽업'}</div></div>
              <div class="summary-row"><div class="k">잔여쿠폰</div><div class="v" style="color:${Number(order.remainingCoupons || 0) <= 0 ? '#e11d48' : '#d97706'}">${Number(order.remainingCoupons || 0)}장</div></div>
            </div>

            <div class="complete-actions">
              <div class="row">
                <button class="btn btn-outline" data-action="open-own-settings">⚙️ 개인설정</button>

              </div>

              <div class="help-note center">${Math.max(0, Number(state.completeCountdownRemaining || state.sysSettings.orderCompleteAutoReturnSeconds || 15))}초 후 처음 화면으로 돌아갑니다.</div>

    function renderDashboardView(){
      const activeOrders = [...state.orders].filter(order => isOrderOpenStatus(order)).sort((a,b) => new Date(orderTimestamp(a)) - new Date(orderTimestamp(b)));
      const visibleActiveOrders = activeOrders;
      const todayOrders = state.orders.filter(order => getDateString(order.timestamp) === todayYmd());
      const todayPickupDone = state.orders.filter(order => getNormalizedOrderStatus(order) === 'PICKUP_DONE' && getDateString(getOrderProcessedTimestamp(order)) === todayYmd());
      const todayDeliveryDone = state.orders.filter(order => getNormalizedOrderStatus(order) === 'DELIVERY_DONE' && getDateString(getOrderProcessedTimestamp(order)) === todayYmd());
      const todayCancelled = state.orders.filter(order => getNormalizedOrderStatus(order) === 'CANCELLED' && getDateString(getOrderProcessedTimestamp(order)) === todayYmd());
      const targetCompletedOrders = state.orders
        .filter(order => isOrderClosedStatus(order) && getDateString(getOrderProcessedTimestamp(order)) === state.completedFilterDate)
        .sort((a,b) => new Date(getOrderProcessedTimestamp(b)) - new Date(getOrderProcessedTimestamp(a)));
      const visibleCompletedOrders = targetCompletedOrders.slice(0, Number(state.completedVisibleCount || 10));
      const statsOrders = getStatsOrders();
      const statsCompleted = statsOrders.filter(order => isOrderClosedStatus(order));
      const totalCups = statsOrders.reduce((sum, order) => sum + Number(order.quantity || 0), 0);
      const cupStats = statsOrders.reduce((acc, order) => {
        acc[order.cupType] = (acc[order.cupType] || 0) + Number(order.quantity || 0);
        return acc;
      }, { TUMBLER:0, STORE_CUP:0, DISPOSABLE:0 });
      const deliveryStats = statsOrders.reduce((acc, order) => {
        acc[order.deliveryType] = (acc[order.deliveryType] || 0) + 1;
        return acc;
      }, { PICKUP:0, DELIVERY:0 });
      const searchedUsers = state.users.filter(user => {
        const term = String(state.adminUserSearch || '').trim();
        if(!term) return true;
        return String(user.name || '').includes(term) || String(user.dept || '').includes(term);
      });
      const tumblerSnap = getTumblerDashboardSnapshot();
      const registrationPendingCount = state.registrationRequests.filter(item => item.status === 'PENDING').length;
      const registrationApprovedCount = state.registrationRequests.filter(item => item.status === 'APPROVED').length;
      const registrationRejectedCount = state.registrationRequests.filter(item => item.status === 'REJECTED').length;
      const summaryData = {
        orderStats: {
          open: activeOrders.length,
          todayOrders: todayOrders.length,
          pickupDone: todayPickupDone.length,
          deliveryDone: todayDeliveryDone.length,
          cancelled: todayCancelled.length
        },
        tumblerStats: {
          rented: tumblerSnap.rented.length,
          overdue: tumblerSnap.overdue.length,
          cleaning: tumblerSnap.cleaningCount,
          availableTotal: tumblerSnap.availableTotal
        },
        requestStats: {
          pending: registrationPendingCount,
          approved: registrationApprovedCount,
          rejected: registrationRejectedCount
        }
      };

      return `
        <div class="page-dashboard">

            <button class="${state.dashboardTab === 'ORDERS' ? 'active' : ''}" data-action="set-dashboard-tab" data-value="ORDERS">☕ 주문 운영</button>

            ${state.appRole === 'ADMIN' ? `<button class="${state.dashboardTab === 'USERS' ? 'active' : ''}" data-action="set-dashboard-tab" data-value="USERS">👥 사용자/신청</button>` : ''}

          <div class="dashboard-body">

                  </div>

                  <div class="mini-card">
                    <h3>📌 오늘 요약</h3>

                      <div class="box"><div class="muted" style="font-size:11px;font-weight:800">오늘 접수</div><div class="v" style="color:#d97706">${todayOrders.length}</div></div>
                      <div class="box"><div class="muted" style="font-size:11px;font-weight:800">오늘 제작완료</div><div class="v" style="color:#059669">${todayPickupDone.length}</div></div>
                      <div class="box"><div class="muted" style="font-size:11px;font-weight:800">오늘 배달완료</div><div class="v" style="color:#2563eb">${todayDeliveryDone.length}</div></div>

                      </div>

                  </div>
                </div>

                  <div class="main-card">
                    <div class="section-head">
                      <h2>🔔 제작 대기중 <span class="pill rose">${activeOrders.length}건</span></h2>

                              <div class="order-head">
                                <div>
                                  <div class="order-seq">#${Number(order.seq || 0)}</div>
                                  <div class="order-meta">${escapeHtml(formatAMPM(order.timestamp))}</div>
                                  <div class="order-name">${escapeHtml(order.userNameDisplay || order.userName)} <span style="font-size:15px;color:#777">(${escapeHtml(order.userDept || '소속없음')})</span></div>

                                <div>🥤 컵: ${order.cupType === 'TUMBLER' ? `텀블러 (${escapeHtml(order.tumblerInfo || '')})` : order.cupType === 'STORE_CUP' ? '매장 전용컵' : '일회용컵'}</div>

                    ` : `

                        ${visibleCompletedOrders.map(order => `
                          <div class="done-item">
                            <div class="done-left">
                              <div class="done-seq">#${Number(order.seq || 0)}</div>
                              <div class="done-main">
                                <div class="name">${escapeHtml(order.userNameDisplay || order.userName)} <span style="font-size:13px;color:#777">(${escapeHtml(order.userDept || '소속없음')})</span></div>
                                <div class="sub">${escapeHtml(formatAMPM(getOrderProcessedTimestamp(order) || order.timestamp))} · ☕ ${Number(order.quantity || 0)}잔 · ${order.deliveryType === 'DELIVERY' ? '🚚 배달' : '🏪 픽업'}${order.processedBy ? ` · ${escapeHtml(order.processedBy)}` : ''}${getNormalizedOrderStatus(order) === 'CANCELLED' ? ` · 사유: ${escapeHtml(order.cancelReason || '-')}` : ''}</div>
                              </div>
                            </div>
                            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end">
                              <div class="${getOrderStatusBadgeClass(order)}">${getOrderStatusLabel(order)}</div>

                            </div>
                          </div>
                        `).join('')}
                        ${state.completedVisibleCount < targetCompletedOrders.length ? `<button class="btn btn-gray" style="width:100%" data-action="more-completed-orders">➕ 더 보기 (${state.completedVisibleCount} / ${targetCompletedOrders.length})</button>` : ''}
                      </div>
                    `}
                  </div>

                  ${renderIntegratedTumblerSection()}
                </div>
              </div>
            ` : ''}

            ${state.dashboardTab === 'TUMBLER' ? renderIntegratedTumblerDashboardTabSection() : ''}

            ${state.dashboardTab === 'STATS' ? renderStatsSection(statsOrders, statsCompleted, totalCups, cupStats, deliveryStats) : ''}

            ${state.dashboardTab === 'USERS' && state.appRole === 'ADMIN' ? renderUsersSection(searchedUsers) : ''}

            ${state.dashboardTab === 'SETTINGS' && state.appRole === 'ADMIN' ? renderSettingsSection() : ''}
          </div>
        </div>
      `;

    function orderTimestamp(order){
      return order && order.timestamp ? order.timestamp : 0;
    }

      return `<div class="modal-backdrop"><div class="modal ${extra}">${content}</div></div>`;

            ${isEditMode ? `<div class="help-note" style="margin-bottom:12px">이 화면에서 바로 수정하고 저장할 수 있습니다. 잔여 쿠폰 수량을 바꾼 경우에는 아래에 변경 사유를 함께 입력해 주세요.${user.nameLocked ? ' 승인된 사용자의 이름은 일반 수정에서 변경할 수 없습니다.' : ''}</div>` : (user.nameLocked ? `<div class="help-note" style="margin-bottom:12px">승인된 사용자이므로 이름은 잠금 상태입니다. 필요 시 관리자 전용 이름 강제 변경을 사용하세요.</div>` : '')}

              ${history.length === 0 ? `<div class="center muted" style="padding:30px 10px">기록이 없습니다.</div>` : history.map(item => `

      if(state.showCancelOrderModal){

      if(state.editingOrderId){

            </select>
          </div>
          ${state.editOrderData.cupType === 'TUMBLER' ? `<div class="field"><input id="editOrderTumblerInfo" class="input" type="text" placeholder="텀블러 정보" value="${escapeHtml(state.editOrderData.tumblerInfo)}"></div>` : ''}
          ${state.editOrderData.deliveryType === 'DELIVERY' ? `<div class="field"><input id="editOrderDeliveryLocation" class="input" type="text" placeholder="배달지" value="${escapeHtml(state.editOrderData.deliveryLocation)}"></div>` : ''}
          <div class="field"><input id="editOrderMemo" class="input" type="text" placeholder="요청사항" value="${escapeHtml(state.editOrderData.memo)}"></div>
          <div class="modal-actions"><button class="btn btn-gray" data-action="close-edit-order">취소</button><button class="btn btn-amber" data-action="save-edit-order">저장하기</button></div>
        `);
      }

      if(state.showAddUserModal){
        html += modalShell(`
          <div class="modal-head"><h3>➕ 사용자 추가</h3><button class="modal-close" data-action="close-add-user">❌</button></div>
          <div class="seg-wrap">
            <button class="${state.addUserMode === 'SINGLE' ? 'active' : ''}" data-action="set-add-user-mode" data-value="SINGLE">👤 개별 추가</button>
            <button class="${state.addUserMode === 'BULK' ? 'active' : ''}" data-action="set-add-user-mode" data-value="BULK">👥 복수 추가</button>
          </div>
          ${state.addUserMode === 'SINGLE' ? `
            <div class="field"><input id="newUserName" class="input" type="text" placeholder="이름 (필수)" value="${escapeHtml(state.newUserData.name)}"></div>
            <div class="field"><input id="newUserDept" class="input" type="text" placeholder="부서 (선택)" value="${escapeHtml(state.newUserData.dept)}"></div>
            <div class="field"><input id="newUserCoupons" class="input" type="number" placeholder="초기 쿠폰 수량" value="${escapeHtml(state.newUserData.coupons)}"></div>
            <div class="field"><input id="newUserLocation" class="input" type="text" placeholder="기본 배달 장소 (선택)" value="${escapeHtml(state.newUserData.defaultLocation)}"></div>
            <div class="field"><input id="newUserTumbler" class="input" type="text" placeholder="개인 텀블러 정보 (선택)" value="${escapeHtml(state.newUserData.tumblerInfo)}"></div>
            <div class="field"><input id="newUserPassword" class="input" type="text" placeholder="초기 암호/비밀번호 (선택)" value="${escapeHtml(state.newUserData.password)}"></div>
          ` : `
            <div class="help-note" style="margin-bottom:10px">이름, 부서, 초기쿠폰수를 쉼표(,)나 탭으로 구분하여 한 줄에 한 명씩 입력하세요.<br>예시)<br>홍길동, 교무실, 10<br>김철수, 행정실, 5</div>
            <div class="field"><textarea id="bulkUsersText" class="textarea" placeholder="홍길동, 교무실, 10&#10;김철수, 행정실, 5">${escapeHtml(state.bulkUsersText)}</textarea></div>
          `}
          <button class="btn btn-emerald" style="width:100%" data-action="confirm-add-user">추가하기</button>
        `, 'large tall');
      }

      if(state.showCouponModal){
        html += modalShell(`
          <div class="modal-head"><h3>🎟️ 쿠폰 조정</h3><button class="modal-close" data-action="close-coupon-modal">❌</button></div>
          <div class="help-note" style="background:#f9fafb;padding:10px 12px;border-radius:14px;border:1px solid #eee;margin-bottom:14px">선택된 사용자 <strong style="color:#d97706">${state.selectedUserIds.length}명</strong>에게 일괄 적용됩니다.</div>
          <div class="row" style="margin-bottom:12px">
            <button class="btn ${state.couponAction === 'CHARGE' ? 'btn-blue' : 'btn-outline'}" data-action="set-coupon-action" data-value="CHARGE">➕ 추가</button>
            <button class="btn ${state.couponAction === 'DEDUCT' ? 'btn-rose' : 'btn-outline'}" data-action="set-coupon-action" data-value="DEDUCT">➖ 차감</button>
          </div>
          <div class="field">
            <div class="qty-wrap" style="padding:0">
              <div class="label" style="margin:0">수량</div>
              <div class="qty-control" style="padding:6px 8px;gap:10px">
                <button data-action="coupon-amount-minus">-</button>
                <div class="qty-num" style="font-size:24px">${Number(state.couponAmount || 1)}</div>
                <button data-action="coupon-amount-plus">+</button>
              </div>
            </div>
          </div>
          <div class="field">
            <select id="couponReason" class="select">
              <option value="재료비 후원" ${state.couponReason === '재료비 후원' ? 'selected' : ''}>재료비 후원</option>
              <option value="주문 실수 복구" ${state.couponReason === '주문 실수 복구' ? 'selected' : ''}>주문 실수 복구</option>
              <option value="단골손님 비밀 보너스" ${state.couponReason === '단골손님 비밀 보너스' ? 'selected' : ''}>단골손님 비밀 보너스</option>
              <option value="기타" ${state.couponReason === '기타' ? 'selected' : ''}>기타 (직접 입력)</option>
            </select>
          </div>
          ${state.couponReason === '기타' ? `<div class="field"><input id="customReason" class="input" type="text" placeholder="사유를 입력하세요" value="${escapeHtml(state.customReason)}"></div>` : ''}
          <button class="btn btn-dark" style="width:100%" data-action="confirm-bulk-coupon">적용하기</button>
        `);
      }

      return html;
    }

    function setupAutoReturn(){
      clearTimeout(autoReturnTimer);
      clearInterval(autoReturnInterval);
      autoReturnTimer = null;
      autoReturnInterval = null;
      if(state.currentView === 'ORDER_COMPLETE' && !state.ocShowSettings && !state.ocShowHistory){
        const seconds = Math.max(3, Number(state.sysSettings.orderCompleteAutoReturnSeconds || 15));
        state.completeCountdownRemaining = seconds;
        autoReturnInterval = setInterval(() => {
          if(state.currentView !== 'ORDER_COMPLETE' || state.ocShowSettings || state.ocShowHistory){
            clearInterval(autoReturnInterval);
            autoReturnInterval = null;
            return;
          }
          state.completeCountdownRemaining = Math.max(0, Number(state.completeCountdownRemaining || 0) - 1);
          render();
        }, 1000);
        autoReturnTimer = setTimeout(() => {
          clearInterval(autoReturnInterval);
          autoReturnInterval = null;
          state.completeCountdownRemaining = 0;
          state.currentView = 'ORDER_MAIN';
          state.currentOrderId = null;
          resetOrderInputs();
          render();
        }, seconds * 1000);
      }else{
        state.completeCountdownRemaining = 0;
      }
    }

    function setAppHeightVar(){
      try{ document.documentElement.style.setProperty('--app-height', `${window.innerHeight}px`); }catch(error){}
    }
    setAppHeightVar();
    window.addEventListener('resize', setAppHeightVar);
    window.addEventListener('orientationchange', setAppHeightVar);

    function keepInputVisible(element){
      if(!element) return;
      window.setTimeout(() => {
        try{ element.scrollIntoView({ block:'center', inline:'nearest' }); }catch(error){}
      }, 180);
    }

    document.addEventListener('focusin', (event) => {
      const t = event.target;
      if(!(app.contains(t) || modalRoot.contains(t))) return;
      if(!t || !['INPUT','TEXTAREA','SELECT'].includes(t.tagName)) return;
      keepInputVisible(t);
    });

    // =========================================================
    // [6] 이벤트 연결
    // =========================================================
    document.addEventListener('input', (event) => {
      const t = event.target;
      if(!(app.contains(t) || modalRoot.contains(t))) return;
      if(t.id === 'searchTerm'){
        state.searchTerm = t.value;
        if(!searchTermIsComposing) renderOrderSearchResults();
        return;
      }
      if(t.id === 'orderMemo'){ state.orderMemo = t.value; return; }
      if(t.id === 'showMemoInput'){ state.showMemoInput = t.checked; render(); return; }
      if(t.id === 'selfRegName'){ state.selfRegData.name = t.value; return; }
      if(t.id === 'selfRegDept'){ state.selfRegData.dept = t.value; return; }
      if(t.id === 'selfRegLocation'){ state.selfRegData.defaultLocation = t.value; return; }
      if(t.id === 'selfRegTumbler'){ state.selfRegData.tumblerInfo = t.value; return; }
      if(t.id === 'tempLocation'){ state.tempLocation = t.value; return; }
      if(t.id === 'tempTumblerInfo'){ state.tempTumblerInfo = t.value; return; }
      if(t.id === 'userPwInput'){ state.userPwInput = t.value; return; }
      if(t.id === 'loginPw'){ state.loginPw = t.value; return; }
      if(t.id === 'ocNickname'){ state.ocNickname = t.value; return; }
      if(t.id === 'ocDefaultLocation'){ state.ocDefaultLocation = t.value; return; }
      if(t.id === 'ocTumblerInfo'){ state.ocTumblerInfo = t.value; return; }
      if(t.id === 'ocPassword'){ state.ocPassword = t.value; return; }
      if(t.id === 'editUserName'){ state.editUserData.name = t.value; return; }
      if(t.id === 'editUserDept'){ state.editUserData.dept = t.value; return; }
      if(t.id === 'editUserLocation'){ state.editUserData.defaultLocation = t.value; return; }
      if(t.id === 'editUserTumbler'){ state.editUserData.tumblerInfo = t.value; return; }
      if(t.id === 'editUserNickname'){ state.editUserData.nickname = t.value; return; }
      if(t.id === 'editUserCoupons'){ state.editUserData.coupons = t.value; return; }
      if(t.id === 'editUserCouponReason'){ state.editUserData.couponReason = t.value; return; }
      if(t.id === 'editOrderTumblerInfo'){ state.editOrderData.tumblerInfo = t.value; return; }
      if(t.id === 'editOrderDeliveryLocation'){ state.editOrderData.deliveryLocation = t.value; return; }
      if(t.id === 'editOrderMemo'){ state.editOrderData.memo = t.value; return; }
      if(t.id === 'newUserName'){ state.newUserData.name = t.value; return; }
      if(t.id === 'newUserDept'){ state.newUserData.dept = t.value; return; }
      if(t.id === 'newUserCoupons'){ state.newUserData.coupons = t.value; return; }
      if(t.id === 'newUserLocation'){ state.newUserData.defaultLocation = t.value; return; }
      if(t.id === 'newUserTumbler'){ state.newUserData.tumblerInfo = t.value; return; }
      if(t.id === 'newUserPassword'){ state.newUserData.password = t.value; return; }
      if(t.id === 'bulkUsersText'){ state.bulkUsersText = t.value; return; }
      if(t.id === 'adminUserSearch'){ state.adminUserSearch = t.value; render(); return; }
      if(t.id === 'registrationHistorySearch'){ state.registrationHistorySearch = t.value; render(); return; }
      if(t.id === 'settingsNoticeLink'){ state.noticeLinkDraft = t.value; return; }
      if(t.id === 'scheduleReason'){ state.scheduleDraft.reason = t.value; return; }
      if(t.id === 'forceRenameName'){ state.forceRenameData.name = t.value; return; }
      if(t.id === 'forceRenameReason'){ state.forceRenameData.reason = t.value; return; }
      if(t.id === 'customReason'){ state.customReason = t.value; return; }
    });

    document.addEventListener('compositionstart', (event) => {
      const t = event.target;
      if(!(app.contains(t) || modalRoot.contains(t))) return;
      if(t.id === 'searchTerm') searchTermIsComposing = true;
    });

    document.addEventListener('compositionend', (event) => {
      const t = event.target;
      if(!(app.contains(t) || modalRoot.contains(t))) return;
      if(t.id === 'searchTerm'){
        searchTermIsComposing = false;
        state.searchTerm = t.value;
        renderOrderSearchResults();
      }
    });

    document.addEventListener('change', (event) => {
      const t = event.target;
      if(!(app.contains(t) || modalRoot.contains(t))) return;
      if(t.id === 'warningTimeSelect'){ updateSysSettings({ warningTime: Number(t.value) || 15 }); return; }
      if(t.id === 'orderCompleteAutoReturnSecondsSelect'){ updateSysSettings({ orderCompleteAutoReturnSeconds: Number(t.value) || 15 }); return; }
      if(t.id === 'completedFilterDate'){ state.completedFilterDate = t.value; state.completedVisibleCount = 10; render(); return; }
      if(t.id === 'statsPeriodType'){ state.statsPeriodType = t.value; render(); return; }
      if(t.id === 'statsStartDate'){ state.statsStartDate = t.value; return; }
      if(t.id === 'statsEndDate'){ state.statsEndDate = t.value; return; }
      if(t.id === 'scheduleType'){ state.scheduleDraft.type = t.value; return; }
      if(t.id === 'scheduleRepeatMode'){ state.scheduleDraft.repeatMode = t.value; render(); return; }
      if(t.id === 'scheduleDate'){ state.scheduleDraft.date = t.value; return; }
      if(t.id === 'scheduleStartTime'){ state.scheduleDraft.startTime = t.value; return; }
      if(t.id === 'scheduleEndTime'){ state.scheduleDraft.endTime = t.value; return; }
      if(t.id && t.id.startsWith('scheduleWeekday-')){
        const weekday = t.id.split('-').pop();
        const current = new Set(state.scheduleDraft.weekdays || []);
        if(t.checked) current.add(String(weekday));
        else current.delete(String(weekday));
        state.scheduleDraft.weekdays = Array.from(current);
        return;
      }
      if(t.id === 'couponReason'){ state.couponReason = t.value; render(); return; }
      if(t.id === 'editOrderCupType'){
        state.editOrderData.cupType = t.value;
        if(t.value === 'STORE_CUP' && state.editOrderData.deliveryType === 'DELIVERY') state.editOrderData.deliveryType = 'PICKUP';
        render();
        return;
      }
      if(t.id === 'editOrderDeliveryType'){ state.editOrderData.deliveryType = t.value; render(); return; }
      if(t.id === 'ocIsSecure'){ state.ocIsSecure = t.checked; render(); return; }
      if(t.id === 'selectAllUsers'){
        const searchedUsers = state.users.filter(user => {
          const term = String(state.adminUserSearch || '').trim();
          if(!term) return true;
          return String(user.name || '').includes(term) || String(user.dept || '').includes(term);
        });
        state.selectedUserIds = t.checked ? searchedUsers.map(user => user.id) : [];
        render();
        return;
      }
    });

    document.addEventListener('click', (event) => {
      const btn = event.target.closest('[data-action]');
      if(!btn) return;
      if(!(app.contains(btn) || modalRoot.contains(btn))) return;
      const action = btn.dataset.action;

      if(action === 'open-tumbler-link'){
        if(window.HaetsalCombinedApp) window.HaetsalCombinedApp.showRoute('tumbler');
      }
      else if(action === 'open-notice-link'){
        if(state.sysSettings.noticeLink) window.open(state.sysSettings.noticeLink, '_blank');
        else showMessage('등록된 공지사항이 없습니다.');
      }
      else if(action === 'open-self-register'){
        state.showSelfRegModal = true;
        state.selfRegStep = 'INPUT';
        state.duplicateUserIds = [];
        render();
      }
      else if(action === 'close-self-register'){
        state.showSelfRegModal = false;
        render();
      }
      else if(action === 'close-self-register-reset'){

<script>
(function(){
  const root = document.getElementById('tumbler-module');

  function uid(){
    return 'id_' + Math.random().toString(36).slice(2, 11) + Date.now().toString(36);
  }

  function escapeHtml(value){
    return String(value ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

  function getCho(str){
    const cho = ["ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
    let result = "";
    const text = String(str || "");
    for(let i=0;i<text.length;i++) {
      const code = text.charCodeAt(i) - 44032;
      if(code > -1 && code < 11172) result += cho[Math.floor(code / 588)];
      else result += text.charAt(i);
    }
    return result;
  }

  function formatDate(dateInput){
    if(!dateInput) return '';
    const d = new Date(dateInput);
    if(Number.isNaN(d.getTime())) return '';
    return d.toLocaleDateString('ko-KR');
  }

  function formatDateTime(dateInput){
    if(!dateInput) return '';
    const d = new Date(dateInput);
    if(Number.isNaN(d.getTime())) return '';
    const date = d.toLocaleDateString('ko-KR');
    const time = d.toLocaleTimeString('ko-KR', { hour:'numeric', minute:'2-digit' });
    return date + ' ' + time;
  }

  function getDiffDays(dueDate){
    if(!dueDate) return 0;
    const now = new Date();
    const due = new Date(dueDate);
    due.setHours(0,0,0,0);
    now.setHours(0,0,0,0);
    const diff = Math.ceil((now.getTime() - due.getTime()) / (1000*60*60*24));
    return diff > 0 ? diff : 0;
  }

  function isWeekendOrHoliday(date, holidays){
    const day = date.getDay();
    const dateString = date.toISOString().split('T')[0];
    const isHoliday = (holidays || []).some(h => h.startsWith(dateString));
    return day === 0 || day === 6 || isHoliday;
  }

  function calculateDueDate(startDate, daysToAdd, holidays){
    const date = new Date(startDate);
    date.setDate(date.getDate() + Number(daysToAdd || 0));
    while(isWeekendOrHoliday(date, holidays)){
      date.setDate(date.getDate() + 1);
    }
    return date;
  }

  function createTumblersFromSettings(settings){
    const items = [];
    function pushItems(type, count){
      for(let i=1;i<=count;i++){
        items.push({
          id: uid(),
          type,
          number: i,
          status: 'available',
          currentUserId: null,
          currentUserName: null,
          rentalDate: null,
          dueDate: null
        });
      }
    }
    pushItems('ice', settings.iceCount || 20);
    pushItems('hot', settings.hotCount || 25);
    pushItems('store_ice', settings.storeIceCount || 10);
    pushItems('store_hot', settings.storeHotCount || 10);
    pushItems('store_gen', settings.storeGenCount || 10);

    tState.data.rentalHistory = rentalHistoryList().map(item => {

  function getReturnComplianceStats(){
    const now = new Date();
    const start = recentMonthStart();

    const historyItems = rentalHistoryList()
      .filter(item => item && item.rentalDate)
      .filter(item => {
        const rentedAt = new Date(item.rentalDate);
        return !Number.isNaN(rentedAt.getTime()) && rentedAt >= start && rentedAt <= now;
      })
      .map(item => ({
        status: item.status === 'returned' ? 'returned' : 'rented',
        dueDate: item.dueDate,
        returnedAt: item.returnedAt || null
      }));

    const fallbackOpenItems = tumblerList()
      .filter(item => item && item.status === 'rented' && item.rentalDate && !findOpenRentalHistoryByTumbler(item.id))
      .filter(item => {
        const rentedAt = new Date(item.rentalDate);
        return !Number.isNaN(rentedAt.getTime()) && rentedAt >= start && rentedAt <= now;
      })
      .map(item => ({
        status: 'rented',
        dueDate: item.dueDate,
        returnedAt: null
      }));

    const targets = [...historyItems, ...fallbackOpenItems];
    let compliant = 0;
    let nonCompliant = 0;

    targets.forEach(item => {
      const due = item && item.dueDate ? new Date(item.dueDate) : null;
      if(!due || Number.isNaN(due.getTime())) return;

      if(item.status === 'returned'){
        const returnedAt = item.returnedAt ? new Date(item.returnedAt) : null;
        if(!returnedAt || Number.isNaN(returnedAt.getTime())) return;
        if(returnedAt.getTime() <= due.getTime()) compliant += 1;
        else nonCompliant += 1;
        return;
      }

      if(now.getTime() <= due.getTime()) compliant += 1;
      else nonCompliant += 1;
    });

    const total = compliant + nonCompliant;
    return {
      compliant,
      nonCompliant,
      total,
      rate: total > 0 ? Math.round((compliant / total) * 100) : null
    };
  }
