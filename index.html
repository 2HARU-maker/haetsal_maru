  function filteredStaff(search){
    const term = String(search || '').trim().toLowerCase();
    if(!term) return [];
    const isChosungOnly = /^[ㄱ-ㅎ]+$/.test(term);
    const staff = staffList();

    const exactMatches = staff.filter(item => {
      const name = String(item.name || '').trim().toLowerCase();
      const dept = String(item.department || '').trim().toLowerCase();
      return name === term || dept === term;
    });
    if(exactMatches.length){
      return exactMatches.sort((a,b) => String(a.name).localeCompare(String(b.name), 'ko'));
    }

    const textMatches = staff.filter(item => {
      const name = String(item.name || '').trim().toLowerCase();
      const dept = String(item.department || '').trim().toLowerCase();
      return name.startsWith(term) || dept.startsWith(term) || name.includes(term) || dept.includes(term);
    });
    if(textMatches.length && !isChosungOnly){
      return textMatches.sort((a,b) => String(a.name).localeCompare(String(b.name), 'ko'));
    }

    const cho = isChosungOnly ? term : getCho(term);
    return staff.filter(item => {
      const name = String(item.name || '').trim().toLowerCase();
      return getCho(name).includes(cho);
    }).sort((a,b) => String(a.name).localeCompare(String(b.name), 'ko'));
  }

  function applyInventory(){
    if(!tState.inventoryDraft) initInventoryDraft();
    const draft = tState.inventoryDraft;
    const mapKey = {
      ice: 'iceCount',
      hot: 'hotCount',
      store_ice: 'storeIceCount',
      store_hot: 'storeHotCount',
      store_gen: 'storeGenCount'
    };

    const nextData = JSON.parse(JSON.stringify(tState.data));
    const nextTumblers = [...nextData.tumblers];

    for(const type of Object.keys(draft)){
      const target = Math.max(0, Number(draft[type] || 0));
      const currentItems = nextTumblers.filter(item => item.type === type);
      const diff = target - currentItems.length;

      if(diff > 0){
        const maxNumber = currentItems.reduce((max,item)=> Math.max(max, Number(item.number || 0)), 0);
        for(let i=1;i<=diff;i++){
          nextTumblers.push({
            id: uid(),
            type,
            number: maxNumber + i,
            status: 'available',
            currentUserId: null,
            currentUserName: null,
            rentalDate: null,
            dueDate: null
          });
        }
      } else if(diff < 0){
        const removable = currentItems.filter(item => item.status === 'available' || item.status === 'broken').sort((a,b)=> b.number-a.number);
        if(removable.length < Math.abs(diff)){
          showAlert('수량 변경 불가', categoryLabel(type) + ' 항목에 대여/세척 중인 컵이 많아 줄일 수 없습니다.');
          return;
        }
        const removeIds = new Set(removable.slice(0, Math.abs(diff)).map(item => item.id));
        for(let i=nextTumblers.length-1;i>=0;i--){
          if(removeIds.has(nextTumblers[i].id)) nextTumblers.splice(i,1);
        }
      }

      nextData.settings[mapKey[type]] = target;
    }

    nextData.tumblers = nextTumblers;
    tState.data = nextData;
    saveAndRender();
  }

  function confirmStoreCupRent(){
    const person = findStaff(tState.storeCupStaffId);
    if(!person){
      showAlert('오류', '사용자를 먼저 선택해주세요.');
      return;
    }
    const qtys = tState.storeCupQtys;
    const total = Number(qtys.store_ice || 0) + Number(qtys.store_hot || 0) + Number(qtys.store_gen || 0);
    if(total <= 0){
      showAlert('오류', '대여할 컵 수량을 입력해주세요.');
      return;
    }
    const checks = {
      store_ice: availableCount('store_ice'),
      store_hot: availableCount('store_hot'),
      store_gen: availableCount('store_gen')
    };
    if(Number(qtys.store_ice||0) > checks.store_ice || Number(qtys.store_hot||0) > checks.store_hot || Number(qtys.store_gen||0) > checks.store_gen){
      showAlert('재고 부족', '선택한 수량보다 대여 가능한 컵이 부족합니다.');
      return;
    }
    const counts = { ...qtys };
    const rentedAt = new Date();
    const dueDate = calculateDueDate(rentedAt, 2, holidays());
    let desc = [];
    const newRentalHistory = [];
    tState.data.tumblers = tState.data.tumblers.map(item => {
      if(item.status !== 'available') return item;
      if(counts[item.type] > 0){
        counts[item.type] -= 1;
        newRentalHistory.push({
          id: uid(),
          tumblerId: item.id,
          tumblerType: item.type,
          tumblerNumber: item.number,
          userId: person.id,
          userName: person.name,
          rentalDate: rentedAt.toISOString(),
          dueDate: dueDate.toISOString(),
          status: 'rented',
          returnedAt: null,
          returnedStatus: null
        });
        return {
          ...item,
          status:'rented',
          currentUserId: person.id,
          currentUserName: person.name,
          rentalDate: rentedAt.toISOString(),
          dueDate: dueDate.toISOString()
        };
      }
      return item;
    });
    if(Number(qtys.store_ice||0)) desc.push('아이스 ' + Number(qtys.store_ice||0) + '개');
    if(Number(qtys.store_hot||0)) desc.push('핫 ' + Number(qtys.store_hot||0) + '개');
    if(Number(qtys.store_gen||0)) desc.push('공용 ' + Number(qtys.store_gen||0) + '개');
    tState.data.staff = tState.data.staff.map(item => item.id === person.id ? { ...item, totalRentalCount: Number(item.totalRentalCount || 0) + total } : item);
    tState.data.rentalHistory = [...rentalHistoryList(), ...newRentalHistory];
    tState.data.settings.totalSaved = Number(tState.data.settings.totalSaved || 0) + total;
    tState.view = 'success';
    tState.lastRental = {
      userName: person.name,
      tumblerNumber: desc.join(', '),
      dueDate: dueDate.toISOString(),
      totalCount: total,
      iceCount: Number(qtys.store_ice||0),
      hotCount: Number(qtys.store_hot||0)
    };
    tState.modal = null;
    saveAndRender();
  }

  function performDeleteSelectedRentalHistory(targets){
    const idSet = new Set(targets.map(item => item.id));
    const rentalCounts = {};
    const returnCounts = {};
    targets.forEach(item => {
      if(item.userId) rentalCounts[item.userId] = (rentalCounts[item.userId] || 0) + 1;
      if(item.userId && (item.status === 'returned' || item.returnedAt)) returnCounts[item.userId] = (returnCounts[item.userId] || 0) + 1;
    });
    tState.data.rentalHistory = rentalHistoryList().filter(item => !idSet.has(item.id));
    tState.data.staff = tState.data.staff.map(item => ({
      ...item,
      totalRentalCount: Math.max(0, Number(item.totalRentalCount || 0) - Number(rentalCounts[item.id] || 0)),
      returnCount: Math.max(0, Number(item.returnCount || 0) - Number(returnCounts[item.id] || 0))
    }));
    tState.data.settings.totalSaved = Math.max(0, Number(tState.data.settings.totalSaved || 0) - targets.length);
    tState.historySelectedIds = [];
    tState.modal = null;
    saveAndRender();
  }

  function deleteSelectedRentalHistory(){
    if(!tState.historySelectedIds.length){
      showAlert('알림', '삭제할 기록을 먼저 선택해주세요.');
      return;
    }
    const selectedMap = new Map(rentalHistoryRows().map(item => [item.id, item]));
    const targets = tState.historySelectedIds.map(id => selectedMap.get(id)).filter(Boolean);
    if(targets.some(item => !canDeleteRentalHistory(item))){
      showAlert('삭제 불가', '진행 중인 대여 기록은 삭제할 수 없습니다. 반납 완료된 기록만 삭제해 주세요.');
      return;
    }
    const returnedCount = targets.filter(item => item.status === 'returned' || item.returnedAt).length;
    tState.modal = {
      type: 'history-delete-impact',
      totalCount: targets.length,
      returnedCount,

      targetIds: targets.map(item => item.id)

    render();
  }

  function setTumblerAppHeightVar(){
    try{ document.documentElement.style.setProperty('--app-height', `${window.innerHeight}px`); }catch(error){}
  }
  setTumblerAppHeightVar();
  window.addEventListener('resize', setTumblerAppHeightVar);
  window.addEventListener('orientationchange', setTumblerAppHeightVar);

  function keepTumblerInputVisible(element){
    if(!element) return;
    window.setTimeout(() => {
      try{ element.scrollIntoView({ block:'center', inline:'nearest' }); }catch(error){}
    }, 180);
  }

  function getEmbeddedTumblerRoot(){
    return document.getElementById('embedded-tumbler-dashboard');
  }

  function getEmbeddedTumblerModalRoot(){
    return document.getElementById('embedded-tumbler-modal-root');
  }

  function containsTumblerTarget(target){
    const embeddedRoot = getEmbeddedTumblerRoot();
    const embeddedModalRoot = getEmbeddedTumblerModalRoot();
    return (root && root.contains(target)) || (modalRoot && modalRoot.contains(target)) || (embeddedRoot && embeddedRoot.contains(target)) || (embeddedModalRoot && embeddedModalRoot.contains(target));
  }

  document.addEventListener('focusin', function(event){
    const target = event.target;
    if(!containsTumblerTarget(target)) return;
    if(!target || !['INPUT','TEXTAREA','SELECT'].includes(target.tagName)) return;
    keepTumblerInputVisible(target);
  });

  function render(){
    let html = '';
    if(tState.view === 'success') html = renderSuccess();
    else if(tState.view === 'manager' || tState.view === 'admin') html = renderDashboard();
    else html = renderHome();
    root.innerHTML = html;
    if(window.OrderModule && window.OrderModule.syncIntegratedTumblerView){
      window.OrderModule.syncIntegratedTumblerView();
    }
    const embeddedModalRoot = getEmbeddedTumblerModalRoot();
    if(embeddedModalRoot){
      embeddedModalRoot.innerHTML = renderModal();
      modalRoot.innerHTML = '';
    }else{
      modalRoot.innerHTML = renderModal();
    }
  }

  document.addEventListener('input', function(event){
    const target = event.target;
    if(!containsTumblerTarget(target)) return;
    if(target.id === 'tm-search-input') {
      tState.search = target.value;
      renderHomeSearchResults();
      return;
    }
    if(target.id === 'tm-password-input' && tState.modal && tState.modal.type === 'password') {
      tState.modal.input = target.value;
      return;
    }
    if(target.id === 'tm-add-staff-name') {
      tState.addStaffName = target.value;
      return;
    }
    if(target.id === 'tm-add-staff-bulk') {
      tState.addStaffBulk = target.value;
      return;
    }
    if(target.id === 'tm-holiday-date') {
      tState.holidayDate = target.value;
      return;
    }
    if(target.id === 'tm-holiday-name') {
      tState.holidayName = target.value;
      return;
    }
    if(target.id === 'tm-store-search') {
      tState.storeCupSearch = target.value;
      renderStoreSearchResults();
      return;
    }
    if(target.id === 'tm-inventory-ice') tState.inventoryDraft.ice = target.value;
    if(target.id === 'tm-inventory-hot') tState.inventoryDraft.hot = target.value;
    if(target.id === 'tm-inventory-store-ice') tState.inventoryDraft.store_ice = target.value;
    if(target.id === 'tm-inventory-store-hot') tState.inventoryDraft.store_hot = target.value;
    if(target.id === 'tm-inventory-store-gen') tState.inventoryDraft.store_gen = target.value;
  });

  document.addEventListener('change', function(event){
    const target = event.target;
    if(!containsTumblerTarget(target)) return;
    if(target.id === 'tm-extend-check' && tState.modal && tState.modal.type === 'confirm-rent') {
      tState.modal.extend = target.checked;
      if(target.checked && !tState.modal.extendDays) tState.modal.extendDays = 1;
      render();
      return;
    }
  });

  document.addEventListener('click', function(event){
    const btn = event.target.closest('[data-t-action]');
    if(!btn) return;
    if(!containsTumblerTarget(btn)) return;
    const action = btn.dataset.tAction;

    if(action === 'open-password') return openPasswordModal(btn.dataset.role);
    if(action === 'close-modal') return closeModal();
    if(action === 'select-staff') return selectStaff(btn.dataset.staffId);
    if(action === 'clear-selected-staff') {
      tState.selectedStaffId = null;
      tState.selectedTumblers = [];
      render();
      return;
    }
    if(action === 'toggle-show-all') {
      tState.showAll = !tState.showAll;
      render();
      return;
    }
    if(action === 'open-overdue-modal') {
      tState.modal = { type:'overdue-detail' };
      render();
      return;
    }
    if(action === 'toggle-tumbler') return toggleTumbler(btn.dataset.tumblerId);
    if(action === 'clear-selected-tumblers') {
      tState.selectedTumblers = [];
      render();
      return;
    }
    if(action === 'open-rent-modal') {
      const selectedStaff = findStaff(tState.selectedStaffId);
      if(selectedStaff && getActiveRentalItemsForStaff(selectedStaff.id).length > 0){
        return showAlert('대여 불가', '현재 텀블러 대여가 불가합니다. 기존에 대여한 텀블러를 먼저 반납해 주세요.');
      }
      if(tState.selectedTumblers.length > 2) return showAlert('대여 제한', '한 번에 최대 2개까지만 대여할 수 있습니다.');
      if(!tState.selectedTumblers.length) return showAlert('알림', '대여할 텀블러를 먼저 선택해주세요.');
      tState.modal = { type:'confirm-rent', extend:false, extendDays:1 };
      render();
      return;
    }
    if(action === 'change-extend-days' && tState.modal && tState.modal.type === 'confirm-rent') {
      const delta = Number(btn.dataset.delta || 0);
      const current = Number(tState.modal.extendDays || 1);
      tState.modal.extendDays = Math.max(1, Math.min(3, current + delta));
      render();
      return;
    }
    if(action === 'confirm-rent-final') {
      const extra = tState.modal && tState.modal.extend ? Number(tState.modal.extendDays || 1) : 0;
      return confirmRent(extra);
    }
    if(action === 'back-home-from-success') {
      tState.view = 'home';
      render();
      return;
    }
    if(action === 'confirm-password') {
      const modal = tState.modal || {};
      const input = String(modal.input || '');
      if(modal.role === 'admin' && input === settings().adminPw) {
        if(window.HaetsalOperatorSession) window.HaetsalOperatorSession.setRole('ADMIN');
        tState.view = 'admin';
        tState.tab = 'status';
        tState.modal = null;
        render();
        return;
      }
      if(modal.role === 'manager' && input === settings().managerPw) {
        if(window.HaetsalOperatorSession) window.HaetsalOperatorSession.setRole('MANAGER');
        tState.view = 'manager';
        tState.tab = 'status';
        tState.modal = null;
        render();
        return;
      }
      showAlert('인증 실패', '번호가 일치하지 않습니다.');
      return;
    }
    if(action === 'dashboard-home') {
      tState.view = 'home';
      render();
      return;
    }
    if(action === 'return-dashboard-session') {
      const nextRole = window.HaetsalOperatorSession ? window.HaetsalOperatorSession.getTumblerRole() : 'guest';
      if(nextRole === 'guest') {
        showAlert('알림', '현재 유지 중인 운영자 세션이 없습니다.');
        return;
      }
      if(window.OrderModule && window.OrderModule.openDashboard){
        window.OrderModule.openDashboard(nextRole === 'admin' ? 'ADMIN' : 'MANAGER', 'TUMBLER');
      }
      if(window.HaetsalCombinedApp) window.HaetsalCombinedApp.showRoute('order');
      return;
    }
    if(action === 'open-order-dashboard') {
      if(window.OrderModule && window.OrderModule.openDashboard){
        window.OrderModule.openDashboard(tState.view === 'admin' ? 'ADMIN' : 'MANAGER', 'ORDERS');
      }
      if(window.HaetsalCombinedApp) window.HaetsalCombinedApp.showRoute('order');
      return;
    }
    if(action === 'set-tab') {
      tState.tab = btn.dataset.tab || 'status';
      if(tState.tab !== 'history') tState.historySelectedIds = [];
      render();
      requestAnimationFrame(() => {
        const embeddedRoot = getEmbeddedTumblerRoot();
        const mainEl = embeddedRoot ? embeddedRoot.querySelector('.tm-main') : root.querySelector('.tm-main');
        if(mainEl) mainEl.scrollTop = 0;
      });
      return;
    }
    if(action === 'confirm-action') {
      const confirmAction = btn.dataset.confirmAction;
      const id = btn.dataset.id;
      const titles = {
        'return-available': '반납완료 처리',
        'return-cleaning': '세척중 처리',
        'mark-available': '즉시 대여 가능 처리',
        'extend': '기한 연장'
      };
      const messages = {
        'return-available': '선택한 항목을 바로 반납완료 처리하시겠습니까?',
        'return-cleaning': '선택한 항목을 세척중 상태로 변경하시겠습니까?',
        'mark-available': '선택한 항목을 즉시 대여 가능한 상태로 변경하시겠습니까?',
        'extend': '반납 기한을 1일 연장하시겠습니까?'
      };
      return showConfirm(titles[confirmAction] || '확인', messages[confirmAction] || '진행하시겠습니까?', confirmAction, { ids:[id] });
    }
    if(action === 'confirm-modal-action') {
      const modal = tState.modal;
      if(!modal) return;
      return handleConfirmAction(modal.action, modal.payload || {});
    }
    if(action === 'add-staff-single') return addStaffSingle();
    if(action === 'add-staff-bulk') return addStaffBulk();
    if(action === 'confirm-delete-staff') return showConfirm('사용자 삭제', '이 사용자를 삭제하시겠습니까?', 'delete-staff', { staffId: btn.dataset.staffId });
    if(action === 'toggle-history-select') return toggleHistorySelection(btn.dataset.historyId);
    if(action === 'toggle-history-select-all') return toggleAllHistorySelection();
    if(action === 'delete-selected-history') return deleteSelectedRentalHistory();
    if(action === 'confirm-delete-selected-history') {
      const modal = tState.modal || {};
      const selectedMap = new Map(rentalHistoryRows().map(item => [item.id, item]));
      const targets = (modal.targetIds || []).map(id => selectedMap.get(id)).filter(Boolean);
      if(!targets.length){
        showAlert('알림', '삭제할 기록을 찾을 수 없습니다.');
        return;
      }
      if(targets.some(item => !canDeleteRentalHistory(item))){
        showAlert('삭제 불가', '진행 중인 대여 기록은 삭제할 수 없습니다.');
        return;
      }
      return performDeleteSelectedRentalHistory(targets);
    }
    if(action === 'add-holiday') return addHoliday();
    if(action === 'confirm-delete-holiday') return showConfirm('일정 삭제', '해당 일정을 삭제하시겠습니까?', 'delete-holiday', { entry: btn.dataset.entry });
    if(action === 'save-inventory') return applyInventory();
    if(action === 'toggle-broken') return toggleBroken(btn.dataset.id);
    if(action === 'open-store-cup-modal') return openStoreCupModal();
    if(action === 'select-store-staff') {
      tState.storeCupStaffId = btn.dataset.staffId;
      render();
      return;
    }
    if(action === 'store-qty') {
      const type = btn.dataset.type;
      const delta = Number(btn.dataset.delta || 0);
      const current = Number(tState.storeCupQtys[type] || 0);
      const maxCount = availableCount(type);
      tState.storeCupQtys[type] = Math.max(0, Math.min(maxCount, current + delta));
      render();
      return;
    }
    if(action === 'confirm-store-cup-rent') return confirmStoreCupRent();
  });

  if(window.HaetsalCloudStore && window.HaetsalCloudStore.subscribeTumblerData){
    window.HaetsalCloudStore.subscribeTumblerData(function(nextData){
      if(!nextData) return;
      applyCloudData(nextData);
    });
  }

  window.TumblerModule = {
    render,
    state: tState,
    refreshFromShared,
    ensureDashboard: function(role){
      const sessionRole = window.HaetsalOperatorSession && window.HaetsalOperatorSession.isActive()
        ? window.HaetsalOperatorSession.getTumblerRole()
        : 'guest';
      const nextRole = role === 'admin' || role === 'manager' ? role : (sessionRole === 'admin' || sessionRole === 'manager' ? sessionRole : 'manager');
      tState.view = nextRole === 'admin' ? 'admin' : 'manager';
      if(window.HaetsalOperatorSession) window.HaetsalOperatorSession.setRole(tState.view === 'admin' ? 'ADMIN' : 'MANAGER');
      if(!['status','staff','history','holiday','inventory'].includes(tState.tab)) tState.tab = 'status';
      tState.modal = null;
    },
    renderEmbeddedDashboard: function(){
      this.ensureDashboard(tState.view === 'admin' ? 'admin' : tState.view === 'manager' ? 'manager' : undefined);
      const full = renderDashboard();
      const marker = '<div class="tm-layout">';
      const start = full.indexOf(marker);
      const shellClose = full.lastIndexOf('</div>');
      const layoutHtml = start >= 0 && shellClose > start ? full.slice(start, shellClose) : `<div class="tm-card tm-card-pad"><div class="tm-empty">텀블러 운영 화면을 불러오지 못했습니다.</div></div>`;
      return `
        <div class="tm-embedded-dashboard">
          <div class="tm-card tm-card-pad">
            <div class="tm-toolbar" style="margin-bottom:0">
              <div>
                <div class="tm-section-title" style="margin-bottom:6px">🥤 텀블러 운영</div>
                <div class="tm-mini">주문 운영과 같은 패널 안에서 대여 · 반납 · 기록 · 재고를 바로 관리할 수 있습니다.</div>
              </div>
              <div class="tm-top-actions">
                ${renderTumblerSaveStatusChip()}
                <button class="tm-btn tm-btn-white" data-t-action="open-store-cup-modal">🥤 카페 일반컵 대여 등록</button>
                <div class="tm-mini" style="padding:10px 0 0">주문 운영은 상단의 <b>☕ 주문 운영</b> 탭에서 확인할 수 있습니다.</div>
              </div>
            </div>
          </div>
          ${layoutHtml}
          <div id="embedded-tumbler-modal-root"></div>
        </div>
      `;
    },
    openDashboard: function(role){
      const sessionRole = window.HaetsalOperatorSession && window.HaetsalOperatorSession.isActive()
        ? window.HaetsalOperatorSession.getTumblerRole()
        : 'guest';
      const nextRole = role === 'admin' || role === 'manager' ? role : (sessionRole === 'admin' || sessionRole === 'manager' ? sessionRole : 'manager');
      tState.view = nextRole === 'admin' ? 'admin' : 'manager';
      if(window.HaetsalOperatorSession) window.HaetsalOperatorSession.setRole(tState.view === 'admin' ? 'ADMIN' : 'MANAGER');
      tState.tab = 'status';
      tState.modal = null;
      render();
    }
  };
  render();
})();
</script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
  import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
  import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBfEwPirSANZ2s7CzRvlUeFDnYNxWITuew",
    authDomain: "haetsal-maru-24b95.firebaseapp.com",
    projectId: "haetsal-maru-24b95",
    storageBucket: "haetsal-maru-24b95.firebasestorage.app",
    messagingSenderId: "891947497659",
    appId: "1:891947497659:web:2724d40f10373d091ed19e"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  async function ensureAnonymousLogin() {
    if (auth.currentUser) return auth.currentUser;
    const result = await signInAnonymously(auth);
    return result.user;
  }

  const firebaseReadyPromise = new Promise((resolve, reject) => {
    const unsubscribe = onAuthStateChanged(
      auth,
      async (user) => {
        try {
          if (user) {
            window.firebaseAuthUser = user;
            resolve(user);
            unsubscribe();
            return;
          }
          const signedInUser = await ensureAnonymousLogin();
          window.firebaseAuthUser = signedInUser;
          resolve(signedInUser);
          unsubscribe();
        } catch (error) {
          console.error("Firebase 익명 로그인 실패:", error);
          reject(error);
          unsubscribe();
        }
      },
      (error) => {
        console.error("Firebase 인증 상태 확인 실패:", error);
        reject(error);
        unsubscribe();
      }
    );
  });

  window.firebaseApp = app;
  window.firebaseAuth = auth;
  window.firebaseDb = db;
  window.firebaseReadyPromise = firebaseReadyPromise;

  const cloudDocRefs = {
    shared: doc(db, 'haetsalCombinedApp', 'shared_people_auth'),
    order: doc(db, 'haetsalCombinedApp', 'order_data'),
    tumbler: doc(db, 'haetsalCombinedApp', 'tumbler_data')
  };

  function buildPayload(data){
    return {
      data: JSON.parse(JSON.stringify(data)),
      updatedAt: new Date().toISOString()
    };
  }

  firebaseReadyPromise.then(() => {
    if(window.HaetsalCloudStore && window.HaetsalCloudStore.registerSaveHandler){
      window.HaetsalCloudStore.registerSaveHandler(function(key, value){
        const ref = cloudDocRefs[key];
        if(!ref) return Promise.resolve();
        return setDoc(ref, buildPayload(value));
      });
    }

    Object.keys(cloudDocRefs).forEach(key => {
      onSnapshot(cloudDocRefs[key], snapshot => {
        if(!snapshot.exists()) return;
        const payload = snapshot.data();
        if(!payload || !Object.prototype.hasOwnProperty.call(payload, 'data')) return;
        if(window.HaetsalCloudStore && window.HaetsalCloudStore.applyRemote){
          window.HaetsalCloudStore.applyRemote(key, payload.data);
        }
      }, error => {
        console.error(`Firestore ${key} 불러오기 실패:`, error);
      });
    });
  }).catch(error => {
    console.error('Firebase 준비 실패:', error);
  });
</script>
